<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Endüstri İmparatorluğu v5</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

/* ── ROOT VARIABLES ── */
:root {
  --bg0:#080c10; --bg1:#0d1117; --bg2:#161b22; --bg3:#1c2330;
  --accent:#00d4ff; --accent2:#ff6b35; --accent3:#39ff14;
  --gold:#ffd700; --red:#ff3535; --purple:#a855f7; --pink:#ff00ff;
  --text:#e2e8f0; --text2:#94a3b8; --text3:#4a5568;
  --border:#1e2d3d; --border2:#2a3f55; --card:#0f1923;
  --z1:#00d4ff; --z2:#39ff14; --z3:#a855f7; --z4:#ff6b35;
  --z5:#ff3535; --z6:#ffd700; --z7:#ff00ff; --z8:#00ffee;
  --zone-accent:var(--z1);
  --header-bg:linear-gradient(135deg,#0a1520 0%,#0d1a2a 50%,#0a1520 100%);
}
.zone-2-theme { --zone-accent:var(--z2); --bg0:#061008; --bg1:#091510; --bg2:#0f2010; --bg3:#162a16; --border:#1a2d1a; --border2:#224022; --card:#091510; }
.zone-3-theme { --zone-accent:var(--z3); --bg0:#100815; --bg1:#150d1e; --bg2:#1c1128; --bg3:#251535; --border:#2a1a3d; --border2:#3a2055; --card:#130c1a; }
.zone-4-theme { --zone-accent:var(--z4); --bg0:#151008; --bg1:#1e160a; --bg2:#2a1e0f; --bg3:#352616; --border:#3d2d10; --border2:#553f18; --card:#1a1208; }
.zone-5-theme { --zone-accent:var(--z5); --bg0:#150808; --bg1:#1e0d0d; --bg2:#2a1515; --bg3:#351a1a; --border:#3d1a1a; --border2:#552020; --card:#1a0c0c; }
.zone-6-theme { --zone-accent:var(--z6); --bg0:#151308; --bg1:#1e1b0a; --bg2:#2a2510; --bg3:#352f16; --border:#3d3610; --border2:#554c18; --card:#1a1608; }
.zone-7-theme { --zone-accent:var(--z7); --bg0:#150815; --bg1:#1e0b1e; --bg2:#2a1228; --bg3:#351535; --border:#3d103d; --border2:#551855; --card:#1a081a; }
.zone-8-theme { --zone-accent:var(--z8); --bg0:#001515; --bg1:#001e1e; --bg2:#002a2a; --bg3:#003535; --border:#004040; --border2:#005555; --card:#001a1a; }


/* ── PLATINUM NEON/GLOW EFFECTS ── */
.glow-text { text-shadow: 0 0 10px var(--zone-accent), 0 0 20px var(--zone-accent); }
.glow-border { box-shadow: 0 0 15px var(--zone-accent); border-color: var(--zone-accent) !important; }
.platinum-card { background: rgba(22, 27, 34, 0.8) !important; backdrop-filter: blur(10px); border: 1px solid var(--border2); transition: all 0.3s; }
.platinum-card:hover { border-color: var(--zone-accent); box-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }

/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;}
body{background:var(--bg0);color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;overflow:hidden;user-select:none;transition:background 1s;}
.app{display:flex;flex-direction:column;height:100dvh;position:relative;overflow:hidden;}

/* ── PARTICLES ── */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.particle{position:absolute;width:2px;height:2px;background:var(--zone-accent);border-radius:50%;opacity:0;animation:float linear infinite;}
@keyframes float{0%{opacity:0;transform:translateY(100vh)}10%{opacity:.6}90%{opacity:.2}100%{opacity:0;transform:translateY(-20px) translateX(20px)}}

/* ── HEADER ── */
.header{background:var(--header-bg);border-bottom:2px solid var(--border2);padding:5px 10px 4px;flex-shrink:0;position:relative;z-index:10;}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--zone-accent),transparent);animation:scanline 3s linear infinite;}
@keyframes scanline{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px;}
.game-title{font-family:'Orbitron',monospace;font-size:10px;color:var(--zone-accent);letter-spacing:2px;font-weight:700;text-shadow:0 0 8px var(--zone-accent);}
.header-badges{display:flex;gap:4px;align-items:center;}
.zone-era-badge{font-size:9px;color:var(--text2);background:var(--bg3);border:1px solid var(--border2);border-radius:4px;padding:2px 6px;font-family:'Share Tech Mono',monospace;}
.diff-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-family:'Orbitron',monospace;font-weight:700;border:1px solid;}
.event-badge{font-size:9px;padding:2px 6px;border-radius:4px;background:rgba(255,107,53,0.2);border:1px solid var(--accent2);color:var(--accent2);font-family:'Share Tech Mono',monospace;cursor:pointer;animation:eventPulse 1.5s ease-in-out infinite alternate;}
@keyframes eventPulse{from{box-shadow:0 0 4px var(--accent2)}to{box-shadow:0 0 12px var(--accent2)}}

/* ── HEADER STATS GRID ── */
.header-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;margin-bottom:3px;}
.stat-chip{display:flex;align-items:center;gap:2px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 5px;font-family:'Share Tech Mono',monospace;font-size:10px;min-width:0;}
.stat-chip .lbl{color:var(--text3);font-size:9px;flex-shrink:0;}
.stat-chip .val{color:var(--zone-accent);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;}
.stat-chip.gold .val{color:var(--gold);}
.stat-chip.red-v .val{color:var(--red);}
.stat-chip.purple-v .val{color:var(--purple);}
.stat-chip.green-v .val{color:var(--accent3);}
.stat-chip.span2{grid-column:span 2;}
.energy-chip{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:3px 6px;}
.energy-lbl{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);display:flex;justify-content:space-between;margin-bottom:2px;}
.energy-bar{height:5px;background:var(--bg2);border-radius:3px;overflow:hidden;}
.energy-fill{height:100%;border-radius:3px;transition:width .4s;}
.energy-ok{background:linear-gradient(90deg,var(--accent),var(--accent3));}
.energy-low{background:linear-gradient(90deg,var(--accent2),var(--red));}
.ctrl-row{display:flex;gap:4px;align-items:center;}
.level-badge{font-family:'Orbitron',monospace;font-size:10px;font-weight:900;padding:3px 8px;border-radius:5px;background:linear-gradient(135deg,var(--purple),var(--zone-accent));color:#fff;flex-shrink:0;}
.xp-bar-wrap{flex:1;padding:0 2px;}
.xp-bar{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--zone-accent));transition:width .6s;}
.ctrl-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text);border-radius:5px;padding:3px 7px;font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'Rajdhani',sans-serif;}
.ctrl-btn:active{transform:scale(.93);}
.ctrl-btn.paused{background:var(--red);border-color:var(--red);}
.ctrl-btn.spd.on{background:var(--accent2);border-color:var(--accent2);color:#fff;}

/* ── TABS ── */
.tabs{display:flex;background:var(--bg1);border-bottom:2px solid var(--border2);flex-shrink:0;z-index:9;position:relative;overflow-x:auto;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:8px 7px;text-align:center;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;color:var(--text2);cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;position:relative;}
.tab.active{color:var(--zone-accent);border-bottom-color:var(--zone-accent);}
.tab-badge{position:absolute;top:3px;right:2px;background:var(--red);color:#fff;border-radius:8px;padding:0 4px;font-size:8px;min-width:12px;text-align:center;}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:8px 10px;-webkit-overflow-scrolling:touch;position:relative;z-index:1;}
.content::-webkit-scrollbar{width:3px;}
.content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* ── OVERLAYS ── */
.overlay{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.96);}
.overlay-inner{text-align:center;padding:28px;max-width:360px;width:100%;}
.overlay-icon{font-size:64px;animation:pulse .8s ease-in-out infinite alternate;display:block;margin-bottom:12px;}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.1)}}
.overlay-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:900;margin-bottom:8px;}
.overlay-sub{font-size:13px;color:var(--text2);margin-bottom:16px;}
.overlay-btn{padding:10px 26px;border-radius:10px;border:none;font-family:'Orbitron',monospace;font-weight:700;font-size:13px;cursor:pointer;background:linear-gradient(135deg,var(--zone-accent),var(--purple));color:#fff;box-shadow:0 0 16px var(--zone-accent);margin:3px;}
.overlay-btn.secondary{background:var(--bg3);box-shadow:none;border:1px solid var(--border2);color:var(--text2);}
.zone-stars{position:absolute;inset:0;pointer-events:none;}
.zone-star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite alternate;}
@keyframes twinkle{from{opacity:.2}to{opacity:.9}}

/* ── ZONE HEADER ── */
.zone-header{margin-bottom:8px;padding:9px 11px;background:var(--card);border-radius:10px;border:1px solid var(--border2);}
.zh-top{display:flex;align-items:center;gap:8px;}
.zone-badge{font-family:'Orbitron',monospace;font-weight:900;font-size:11px;padding:4px 10px;border-radius:7px;background:var(--bg3);border:2px solid var(--zone-accent);color:var(--zone-accent);flex-shrink:0;}
.zone-title{flex:1;min-width:0;}
.zone-name{font-weight:700;font-size:13px;color:var(--zone-accent);text-shadow:0 0 6px var(--zone-accent);}
.zone-multi{font-size:9px;color:var(--text2);font-family:'Share Tech Mono',monospace;}
.zone-adv-btn{background:linear-gradient(135deg,var(--accent2),var(--gold));color:var(--bg0);border:none;border-radius:7px;padding:6px 11px;font-weight:700;font-size:11px;cursor:pointer;flex-shrink:0;font-family:'Rajdhani',sans-serif;}
.zone-req-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.req-chip{font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid;font-family:'Share Tech Mono',monospace;}
.req-chip.met{border-color:var(--accent3);color:var(--accent3);background:rgba(57,255,20,.08);}
.req-chip.unmet{border-color:var(--text3);color:var(--text3);}

/* ── AGE MECHANIC BANNER ── */
.age-banner{margin-bottom:8px;padding:8px 11px;background:linear-gradient(135deg,rgba(0,0,0,.6),rgba(20,5,40,.7));border:1px solid var(--zone-accent);border-radius:10px;position:relative;overflow:hidden;}
.age-banner::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--zone-accent),transparent);}
.age-banner-title{font-family:'Orbitron',monospace;font-size:9px;color:var(--zone-accent);margin-bottom:4px;letter-spacing:1px;}
.age-banner-desc{font-size:10px;color:var(--text2);line-height:1.5;}
.age-banner-bonus{font-size:9px;color:var(--accent3);margin-top:4px;font-family:'Share Tech Mono',monospace;}

/* ── ZONE FILTER ── */
.zone-filter{display:flex;gap:4px;overflow-x:auto;margin-bottom:8px;padding-bottom:2px;}
.zone-filter::-webkit-scrollbar{display:none;}
.zf-btn{flex-shrink:0;padding:4px 9px;border-radius:16px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;transition:all .15s;}
.zf-btn.on{background:var(--zone-accent);color:var(--bg0);border-color:var(--zone-accent);}
.zf-btn.locked-z{opacity:.4;}

/* ── BUILDINGS ── */
.bld-grid{display:flex;flex-direction:column;gap:7px;}
.bld-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:9px 11px;position:relative;overflow:hidden;transition:border-color .3s;}
.bld-card.running::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--zone-accent);border-radius:3px 0 0 3px;}
.bld-card.affor::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent3);border-radius:3px 0 0 3px;animation:glowBar 1.5s ease-in-out infinite alternate;}
@keyframes glowBar{from{box-shadow:0 0 4px var(--accent3)}to{box-shadow:0 0 14px var(--accent3)}}
.bld-card.locked-c{opacity:.5;filter:grayscale(.6);}
.bld-card.no-energy::after{content:'⚡ ENERJİ YOK';position:absolute;top:5px;right:7px;font-size:8px;color:var(--red);font-family:'Share Tech Mono',monospace;background:rgba(255,53,53,.1);border:1px solid var(--red);border-radius:3px;padding:1px 4px;}
.bld-card.upgraded{border-color:var(--gold);}
.bc-top{display:flex;align-items:center;gap:7px;}
.bc-icon{font-size:22px;flex-shrink:0;}
.bc-info{flex:1;min-width:0;}
.bc-name{font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bc-desc{font-size:10px;color:var(--text2);}
.bc-count{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;color:var(--zone-accent);background:var(--bg3);border-radius:7px;padding:2px 9px;min-width:36px;text-align:center;flex-shrink:0;border:1px solid var(--border2);}
.bc-count.zero{color:var(--text3);}
.bc-stats{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.bc-stat{display:flex;align-items:center;gap:2px;font-size:9px;background:var(--bg3);border-radius:4px;padding:2px 5px;font-family:'Share Tech Mono',monospace;border:1px solid var(--border);}
.bc-stat.s-rate .sv{color:var(--accent3);}
.bc-stat.s-cost .sv{color:var(--gold);}
.bc-stat.s-energy .sv{color:var(--gold);}
.bc-stat.s-eprod .sv{color:var(--accent3);}
.bc-stat.s-input .sv{color:var(--accent2);}
.bc-stat.s-wage .sv{color:var(--red);}
.bc-stat .sl{color:var(--text3);}
.bc-bottom{display:flex;gap:5px;margin-top:7px;}
.buy-btn{flex:1;padding:8px 4px;border-radius:7px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:4px;}
.buy-btn.on{background:linear-gradient(135deg,var(--zone-accent),var(--accent3));color:var(--bg0);}
.buy-btn.off{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.buy-btn:active.on{transform:scale(.96);}
.buy-max-btn{padding:8px 9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:10px;font-weight:700;cursor:pointer;font-family:'Rajdhani',sans-serif;}
.buy-max-btn.on{border-color:var(--zone-accent);color:var(--zone-accent);}
.sell-bld-btn{padding:8px 10px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-size:12px;cursor:pointer;}
.upg-btn{padding:8px 9px;border-radius:7px;border:1px solid var(--gold);background:rgba(255,215,0,.08);color:var(--gold);font-size:9px;font-weight:700;cursor:pointer;font-family:'Share Tech Mono',monospace;}
.upg-btn.maxed{border-color:var(--text3);color:var(--text3);cursor:default;}
.locked-badge{position:absolute;right:9px;top:9px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;padding:2px 7px;font-size:9px;color:var(--text3);}
.unlock-info{margin-top:5px;font-size:9px;color:var(--text3);}
.upg-level-tag{position:absolute;top:5px;right:9px;font-size:8px;color:var(--gold);font-family:'Orbitron',monospace;background:rgba(255,215,0,.1);border:1px solid rgba(255,215,0,.3);border-radius:3px;padding:1px 5px;}

/* ── RESOURCES ── */
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.res-card{background:var(--card);border:1px solid var(--border2);border-radius:9px;padding:9px;}
.res-card.pinned{border-color:var(--zone-accent);}
.rc-top{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.rc-icon{font-size:16px;flex-shrink:0;}
.rc-name{font-weight:700;font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.rc-val{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--accent3);font-weight:700;}
.rc-rate{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text2);}
.rc-rate.positive{color:var(--accent3);}
.rc-rate.negative{color:var(--red);}
.rc-sell-row{display:flex;align-items:center;gap:4px;margin-top:4px;}
.rc-sell-label{font-size:9px;color:var(--gold);flex:1;}
.rc-sell-input{width:52px;padding:3px 4px;background:var(--bg3);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:10px;font-family:'Share Tech Mono',monospace;text-align:right;}
.rc-sell-input:focus{outline:none;border-color:var(--gold);}
.rc-sell-btn{padding:3px 8px;border-radius:5px;border:1px solid var(--gold);background:transparent;color:var(--gold);font-size:10px;cursor:pointer;font-family:'Rajdhani',sans-serif;}
.rc-auto-tag{font-size:8px;background:rgba(255,215,0,.1);border:1px solid var(--gold);color:var(--gold);border-radius:3px;padding:1px 4px;}
.rc-market-tag{font-size:8px;background:rgba(0,212,255,.1);border:1px solid var(--accent);color:var(--accent);border-radius:3px;padding:1px 4px;}

/* ── RESEARCH ── */
.research-grid{display:flex;flex-direction:column;gap:7px;}
.research-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 11px;}
.research-card.unlocked-r{border-color:var(--accent3);background:rgba(57,255,20,.03);}
.research-card.available{border-color:var(--zone-accent);}
.research-card.locked-r{opacity:.55;}
.rc-r-header{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.rc-r-icon{font-size:20px;flex-shrink:0;}
.rc-r-info{flex:1;min-width:0;}
.rc-r-name{font-weight:700;font-size:12px;}
.rc-r-desc{font-size:10px;color:var(--text2);}
.rc-r-req{font-size:9px;margin-top:2px;}
.rc-r-req.ok{color:var(--accent3);}
.rc-r-req.no{color:var(--text3);}
.rc-r-cost{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--purple);flex-shrink:0;}
.rc-r-done{font-size:10px;padding:2px 8px;border-radius:5px;background:rgba(57,255,20,.15);color:var(--accent3);font-weight:700;}
.research-btn{width:100%;padding:7px;border-radius:7px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;}
.research-btn.can{background:linear-gradient(135deg,var(--purple),var(--zone-accent));color:#fff;}
.research-btn.cant{background:var(--bg3);color:var(--text3);cursor:not-allowed;}
.res-cat{font-family:'Orbitron',monospace;font-size:9px;color:var(--text3);padding:8px 0 3px;letter-spacing:2px;display:flex;align-items:center;gap:5px;}
.res-cat::before,.res-cat::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── MARKET ── */
.market-grid{display:flex;flex-direction:column;gap:7px;}
.market-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:10px 11px;}
.market-card.event-active{border-color:var(--accent2);}
.market-price-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.market-icon{font-size:20px;}
.market-name{flex:1;font-weight:700;font-size:12px;}
.market-price{font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:700;}
.market-price.up{color:var(--accent3);}
.market-price.down{color:var(--red);}
.market-price.normal{color:var(--text);}
.market-trend{font-size:10px;margin-left:2px;}
.market-btns{display:flex;gap:5px;}
.market-buy-btn{flex:1;padding:7px;border-radius:6px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;cursor:pointer;background:rgba(57,255,20,.15);color:var(--accent3);border:1px solid var(--accent3);}
.market-sell-btn{flex:1;padding:7px;border-radius:6px;border:none;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;cursor:pointer;background:rgba(255,107,53,.15);color:var(--accent2);border:1px solid var(--accent2);}
.market-amt-input{width:60px;padding:4px 5px;background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--text);font-size:10px;font-family:'Share Tech Mono',monospace;text-align:right;}
.market-amt-input:focus{outline:none;border-color:var(--zone-accent);}
.market-event-banner{background:rgba(255,107,53,.1);border:1px solid var(--accent2);border-radius:8px;padding:7px 10px;margin-bottom:8px;font-size:11px;}
.market-event-title{color:var(--accent2);font-weight:700;margin-bottom:2px;}
.market-event-desc{color:var(--text2);font-size:10px;}
.market-event-timer{color:var(--gold);font-family:'Share Tech Mono',monospace;font-size:10px;margin-top:2px;}

/* ── EVENTS ── */
.event-list{display:flex;flex-direction:column;gap:7px;}
.event-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 11px;position:relative;overflow:hidden;}
.event-card.active-event{border-color:var(--accent2);}
.event-card.active-event::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--accent2);}
.event-card.good-event::before{background:var(--accent3);}
.event-card.bad-event::before{background:var(--red);}
.event-top{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.event-icon{font-size:22px;}
.event-info{flex:1;}
.event-name{font-weight:700;font-size:13px;}
.event-desc{font-size:10px;color:var(--text2);}
.event-timer-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:5px;}
.event-timer-fill{height:100%;border-radius:2px;transition:width .5s;}
.event-timer-fill.good{background:var(--accent3);}
.event-timer-fill.bad{background:var(--red);}

/* ── TRADE ROUTES ── */
.route-grid{display:flex;flex-direction:column;gap:7px;}
.route-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 11px;}
.route-card.active-route{border-color:var(--accent3);}
.route-top{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.route-icon{font-size:22px;}
.route-info{flex:1;}
.route-name{font-weight:700;font-size:12px;}
.route-desc{font-size:10px;color:var(--text2);}
.route-income{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent3);}
.route-btn{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-weight:700;font-size:11px;cursor:pointer;font-family:'Rajdhani',sans-serif;}
.route-btn.on{border-color:var(--accent3);color:var(--accent3);background:rgba(57,255,20,.1);}
.route-btn.off{border-color:var(--text3);color:var(--text3);}

/* ── ACHIEVEMENTS ── */
.ach-grid{display:flex;flex-direction:column;gap:7px;}
.ach-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:9px 11px;display:flex;align-items:center;gap:9px;}
.ach-card.unlocked{border-color:var(--gold);}
.ach-icon{font-size:26px;flex-shrink:0;filter:grayscale(1);}

.ach-info{flex:1;min-width:0;}
.ach-name{font-weight:700;font-size:12px;color:var(--text3);}
.ach-card.unlocked .ach-name{color:var(--gold);}
.ach-desc{font-size:10px;color:var(--text3);}
.ach-reward{font-size:9px;color:var(--accent3);}
.ach-badge{font-family:'Orbitron',monospace;font-size:8px;padding:2px 5px;border-radius:3px;background:var(--gold);color:var(--bg0);font-weight:700;flex-shrink:0;}

/* ── MESSAGES / LOG ── */
.msg-list{display:flex;flex-direction:column;gap:5px;}
.msg-item{background:var(--card);border:1px solid var(--border);border-radius:7px;padding:7px 9px;border-left:3px solid var(--border2);}
.msg-item.info{border-left-color:var(--accent);}
.msg-item.success{border-left-color:var(--accent3);}
.msg-item.warning{border-left-color:var(--accent2);}
.msg-item.error{border-left-color:var(--red);}
.msg-item.achievement{border-left-color:var(--gold);}
.msg-item.event{border-left-color:var(--pink);}
.msg-time{font-family:'Share Tech Mono',monospace;font-size:8px;color:var(--text3);}

/* ── SETTINGS ── */
.sett-section{display:flex;flex-direction:column;gap:9px;}
.sett-card{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:12px;}
.sett-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--zone-accent);margin-bottom:9px;font-weight:700;}
.sett-row{display:flex;gap:6px;flex-wrap:wrap;}
.sett-btn{flex:1;min-width:78px;padding:9px;border-radius:7px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:12px;cursor:pointer;text-align:center;transition:all .15s;}
.sett-btn:active{transform:scale(.97);}
.sett-btn.s{border-color:var(--accent3);color:var(--accent3);}
.sett-btn.l{border-color:var(--accent);color:var(--accent);}
.sett-btn.r{border-color:var(--red);color:var(--red);}
.sett-btn.s:active{background:var(--accent3);color:var(--bg0);}
.sett-btn.l:active{background:var(--accent);color:var(--bg0);}
.sett-btn.r:active{background:var(--red);color:#fff;}
.info-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);}
.info-row:last-child{border-bottom:none;}
.info-row .ik{color:var(--text2);font-size:11px;}
.info-row .iv{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;}
.toggle-row-label{color:var(--text2);font-size:11px;flex:1;}

.toggle.on .toggle-knob{transform:translateX(17px);}

.diff-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:8px;}
.diff-btn{padding:8px 4px;border-radius:8px;border:2px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:11px;cursor:pointer;text-align:center;transition:all .2s;}
.diff-btn.easy.active{border-color:#39ff14;background:rgba(57,255,20,.15);color:#39ff14;}
.diff-btn.normal.active{border-color:#00d4ff;background:rgba(0,212,255,.15);color:#00d4ff;}

.diff-btn.insane.active{border-color:#ff00ff;background:rgba(255,0,255,.15);color:#ff00ff;}

/* ── GOD MODE ── */
.god-panel{background:rgba(255,0,255,.04);border:1px solid rgba(255,0,255,.25);border-radius:8px;padding:9px;margin-top:6px;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--pink);line-height:1.8;}
.god-quick-btns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.god-btn{flex:1;min-width:60px;padding:6px 4px;border-radius:6px;border:1px solid var(--pink);background:rgba(255,0,255,.1);color:var(--pink);font-size:10px;cursor:pointer;font-family:'Orbitron',monospace;text-align:center;}

/* ── PRESTIGE ── */
.prestige-banner{background:linear-gradient(135deg,rgba(255,0,255,.06),rgba(168,85,247,.06));border:1px solid rgba(255,0,255,.3);border-radius:10px;padding:11px;margin-bottom:8px;}
.prestige-title{font-family:'Orbitron',monospace;font-size:10px;color:var(--pink);margin-bottom:5px;}
.prestige-tech-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;}
.prestige-tech{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px;cursor:pointer;transition:all .2s;}
.prestige-tech.owned{border-color:var(--pink);background:rgba(255,0,255,.08);}
.prestige-tech.cant{opacity:.5;cursor:not-allowed;}
.prestige-tech-name{font-size:11px;font-weight:700;color:var(--text);}
.prestige-tech.owned .prestige-tech-name{color:var(--pink);}
.prestige-tech-desc{font-size:9px;color:var(--text3);margin-top:2px;}
.prestige-tech-cost{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--purple);margin-top:3px;}

/* ── WAGE WARNING ── */
.wage-warning{background:rgba(255,53,53,.1);border:1px solid var(--red);border-radius:7px;padding:5px 10px;font-size:10px;color:var(--red);display:flex;align-items:center;gap:5px;margin-bottom:7px;}

/* ── SEC SEPARATOR ── */
.sec-sep{font-family:'Orbitron',monospace;font-size:9px;color:var(--text3);padding:5px 0 3px;letter-spacing:2px;display:flex;align-items:center;gap:5px;}

/* ── TOAST ── */

.toast{background:var(--bg2);border:1px solid var(--zone-accent);color:var(--zone-accent);padding:7px 16px;border-radius:16px;font-size:11px;font-weight:700;font-family:'Share Tech Mono',monospace;white-space:nowrap;opacity:0;transform:translateY(16px);transition:all .3s;max-width:280px;text-align:center;}

/* ── LEVEL UP FLASH ── */

@keyframes bannerOut{to{opacity:0;transform:translateX(-50%) translateY(-30px)}}

.levelup-banner-lbl{font-family:'Orbitron',monospace;font-size:9px;color:var(--text2);letter-spacing:3px;}
.levelup-banner-num{font-family:'Orbitron',monospace;font-size:34px;font-weight:900;color:var(--purple);text-shadow:0 0 18px var(--purple);}

/* ── ACHIEVEMENT POPUP ── */
.ach-popup{position:fixed;top:14%;left:50%;transform:translateX(-50%);z-index:997;animation:achIn .4s ease-out,achOut .5s ease-in 3s forwards;}
@keyframes achIn{from{opacity:0;transform:translateX(-50%) translateY(-18px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes achOut{to{opacity:0;transform:translateX(-50%) translateY(-28px)}}

.ach-popup-name{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--gold);}
.ach-popup-reward{font-size:11px;color:var(--accent3);margin-top:3px;}

/* ── EVENT POPUP ── */
.event-popup{position:fixed;top:10%;left:50%;transform:translateX(-50%);z-index:997;pointer-events:none;animation:achIn .4s ease-out,achOut .5s ease-in 4s forwards;}

.event-popup-icon{font-size:34px;display:block;margin-bottom:5px;}
.event-popup-title{font-family:'Orbitron',monospace;font-size:8px;color:var(--accent2);letter-spacing:2px;}
.event-popup-name{font-size:14px;font-weight:700;color:var(--text);}
.event-popup-effect{font-size:11px;color:var(--accent3);margin-top:3px;}

/* ── MILESTONE ── */
.milestone-wrap{position:fixed;top:18px;right:8px;z-index:996;display:flex;flex-direction:column;gap:4px;pointer-events:none;}
.milestone{background:rgba(255,215,0,.15);border:1px solid var(--gold);border-radius:7px;padding:5px 10px;font-family:'Orbitron',monospace;font-size:9px;color:var(--gold);animation:msIn .4s ease-out,msOut .5s ease-in 2.5s forwards;}
@keyframes msIn{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes msOut{to{opacity:0;transform:translateX(28px)}}

/* ── FLOAT / BURST / COIN ── */
.float-num{position:fixed;pointer-events:none;z-index:990;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;text-shadow:0 0 8px currentColor;animation:floatUp 1.4s ease-out forwards;}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-55px)}}
.burst-particle{position:fixed;pointer-events:none;z-index:989;border-radius:50%;animation:burst var(--dur) ease-out forwards;}
@keyframes burst{0%{opacity:1;transform:translate(0,0)}100%{opacity:0;transform:translate(var(--tx),var(--ty))}}
.coin-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:988;}
.coin{position:absolute;top:-30px;font-size:16px;animation:coinFall var(--dur) var(--delay) ease-in forwards;}
@keyframes coinFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(360deg);opacity:0}}

/* ── MISC ── */
.shimmer{position:relative;overflow:hidden;}
.shimmer::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.05),transparent);animation:shimmer 4s infinite;}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}
.just-bought{animation:buyFlash .4s ease-out;}
@keyframes buyFlash{0%{box-shadow:0 0 0 0 rgba(57,255,20,.6)}100%{box-shadow:0 0 0 10px rgba(57,255,20,0)}}
/* ══════════════════════════════════════════════════
   VISUAL EFFECTS MODULE
   1. Platinum Glass  2. Resource Liquid  3. Keyframes
══════════════════════════════════════════════════ */

/* ──────────────────────────────────────────────
   1. PLATINUM GLASS
   Kullanım: class="bld-card platinum-glass"
────────────────────────────────────────────── */
.platinum-glass {
  position: relative !important;
  background:
    linear-gradient(135deg,
      rgba(255,255,255,.05)  0%,
      rgba(0,212,255,.025)  50%,
      rgba(168,85,247,.04) 100%
    ) !important;
  backdrop-filter: blur(18px) saturate(160%) brightness(1.06);
  -webkit-backdrop-filter: blur(18px) saturate(160%) brightness(1.06);
  border: none !important;
  border-radius: 14px;
  isolation: isolate;
  overflow: hidden;
  box-shadow:
    0 4px 28px rgba(0,0,0,.55),
    inset 0 1px 0 rgba(255,255,255,.07),
    inset 0 -1px 0 rgba(0,0,0,.45);
  transition: transform .22s ease, box-shadow .22s ease;
}

/* Gradient border — mask tekniği */
.platinum-glass::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  padding: 1px;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,.45)  0%,
    var(--zone-accent)     22%,
    rgba(255,255,255,.05)  48%,
    var(--purple)          75%,
    rgba(255,255,255,.18) 100%
  );
  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  pointer-events: none;
  z-index: 0;
  animation: pgBorder 7s linear infinite;
}

/* Kayan shimmer şeridi */
.platinum-glass::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(
    112deg,
    transparent          28%,
    rgba(255,255,255,.07) 46%,
    rgba(255,255,255,.13) 50%,
    rgba(255,255,255,.07) 54%,
    transparent          72%
  );
  background-size: 220% 100%;
  animation: pgShimmer 6s ease-in-out infinite;
  pointer-events: none;
  z-index: 0;
}

/* İçerik border pseudo'nun üstünde kalır */
.platinum-glass > * { position: relative; z-index: 1; }

.platinum-glass:hover {
  transform: translateY(-2px);
  box-shadow:
    0 10px 40px rgba(0,0,0,.65),
    0 0 0 1px rgba(0,212,255,.40),
    0 0 22px rgba(0,212,255,.14),
    inset 0 1px 0 rgba(255,255,255,.09);
}

@keyframes pgBorder {
  0%,100% { filter: hue-rotate(0deg)   brightness(1);    }
  50%      { filter: hue-rotate(28deg)  brightness(1.15); }
}
@keyframes pgShimmer {
  0%       { background-position:  230% 0; opacity:0; }
  8%       { opacity:1; }
  55%      { background-position: -230% 0; }
  65%,100% { background-position: -230% 0; opacity:0; }
}


/* ──────────────────────────────────────────────
   2. RESOURCE LIQUID — Animasyonlu sıvı bar
   
   HTML:
   <div class="resource-liquid">
     <div class="resource-liquid-fill" style="width:65%"></div>
   </div>
   
   Modifierlar:
     .resource-liquid.rl-sm        → 5px yükseklik
     .resource-liquid.rl-lg        → 12px yükseklik
     .resource-liquid-fill.rl-warn → turuncu
     .resource-liquid-fill.rl-danger → kırmızı
     .resource-liquid-fill.rl-gold   → altın
     .resource-liquid-fill.rl-full   → %90+ çarpıntı
────────────────────────────────────────────── */
.resource-liquid {
  position: relative;
  height: 8px;
  background: var(--bg3);
  border-radius: 6px;
  border: 1px solid var(--border2);
  overflow: hidden;
  box-shadow: inset 0 2px 5px rgba(0,0,0,.45);
}
.resource-liquid.rl-sm { height: 5px; }
.resource-liquid.rl-lg { height: 12px; border-radius: 8px; }

.resource-liquid-fill {
  height: 100%;
  min-width: 4px;
  border-radius: 5px;
  position: relative;
  overflow: hidden;
  background: linear-gradient(
    90deg,
    var(--zone-accent)             0%,
    rgba(255,255,255,.18)         45%,
    var(--zone-accent)            100%
  );
  background-size: 200% 100%;
  animation: rlFlow 2.8s linear infinite;
  transition: width .65s cubic-bezier(.34,1.56,.64,1);
}

/* Üst gloss */
.resource-liquid-fill::before {
  content: '';
  position: absolute;
  top:0; left:0; right:0;
  height: 42%;
  background: rgba(255,255,255,.22);
  border-radius: 5px 5px 0 0;
  pointer-events: none;
}

/* Kayan ışık */
.resource-liquid-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    108deg,
    transparent          18%,
    rgba(255,255,255,.42) 44%,
    rgba(255,255,255,.55) 50%,
    rgba(255,255,255,.42) 56%,
    transparent          82%
  );
  background-size: 280% 100%;
  animation: rlShine 3s ease-in-out infinite;
  pointer-events: none;
}

/* Renk varyantları */
.resource-liquid-fill.rl-warn {
  background: linear-gradient(90deg, var(--accent2) 0%, rgba(255,170,80,.25) 50%, var(--accent2) 100%);
  background-size: 200% 100%;
}
.resource-liquid-fill.rl-danger {
  background: linear-gradient(90deg, var(--red) 0%, rgba(255,80,80,.22) 50%, var(--red) 100%);
  background-size: 200% 100%;
}
.resource-liquid-fill.rl-gold {
  background: linear-gradient(90deg, var(--gold) 0%, rgba(255,230,60,.25) 50%, var(--gold) 100%);
  background-size: 200% 100%;
}

/* %90+ doluluk çarpıntısı */
.resource-liquid-fill.rl-full {
  animation: rlFlow 1.4s linear infinite, rlPulse .85s ease-in-out infinite alternate;
}

@keyframes rlFlow {
  0%   { background-position:  100% 0; }
  100% { background-position: -100% 0; }
}
@keyframes rlShine {
  0%        { background-position:  280% 0; }
  55%       { background-position: -100% 0; }
  55%,100%  { background-position: -100% 0; }
}
@keyframes rlPulse {
  from { filter: brightness(1)    drop-shadow(0 0 2px var(--zone-accent)); }
  to   { filter: brightness(1.38) drop-shadow(0 0 9px var(--zone-accent)); }
}

/* ── RESEARCH TREE PANEL CSS ── */

<body>
<div id="root"></div>
<script type="text/babel">
/* ══════════════════════════════════════════════════
   AUDIO MANAGER — BGM + SFX Sistemi
   Eski SFX.xxx() çağrıları değişmeden çalışır
   (alt satırdaki alias sayesinde)
══════════════════════════════════════════════════ */
const audioManager = (() => {
  let _ctx = null, _bgmGain = null, _sfxGain = null;
  let _bgmActive = false, _bgmTimer = null;
  let _zone = 1, _sr = null;

  // Her bölge için pentatonik/modal dizi (Hz)
  const SCALES = {
    1:[130.81,155.56,174.61,196.00,233.08,261.63], // C minör  — Sanayi
    2:[174.61,196.00,220.00,261.63,293.66,329.63], // F majör  — Ticaret
    3:[220.00,246.94,261.63,311.13,329.63,392.00], // A minör  — Uzay
    4:[261.63,293.66,349.23,392.00,440.00,523.25], // C majör  — Ay
    5:[146.83,174.61,196.00,220.00,246.94,293.66], // D Frig   — Mars
    6:[329.63,369.99,415.30,493.88,554.37,659.25], // E Lidyen — Yıldız
    7:[196.00,220.00,261.63,293.66,329.63,392.00], // G Mikso  — Tanrı
    8:[110.00,130.81,155.56,174.61,220.00,261.63], // A Lokryan— Paralel
  };
  const PATTERNS = {
    1:[0,2,1,3,0,4,2,5], 2:[0,2,4,3,2,0,4,5],
    3:[0,3,5,2,4,1,3,0], 4:[0,2,4,5,4,2,1,0],
    5:[0,1,3,5,3,1,0,2], 6:[0,4,2,5,3,1,4,0],
    7:[5,3,1,0,2,4,3,5], 8:[5,4,2,0,1,3,5,4],
  };

  /* ── Yardımcılar ─────────────────────────────── */
  function getCtx() {
    if (!_ctx) {
      try {
        _ctx = new (window.AudioContext||window.webkitAudioContext)();
        _bgmGain = _ctx.createGain(); _bgmGain.gain.value=0; _bgmGain.connect(_ctx.destination);
        _sfxGain = _ctx.createGain(); _sfxGain.gain.value=1; _sfxGain.connect(_ctx.destination);
      } catch(e){ return null; }
    }
    return _ctx;
  }

  function cfg() {
    if(!_sr) return {musicOn:true,sfxOn:true,vol:0.5};
    return {musicOn:_sr.musicOn!==false, sfxOn:_sr.sfxOn!==false, vol:_sr.audioVolume??0.5};
  }

  function applyVol() {
    const c=getCtx(); if(!c) return;
    const {musicOn,sfxOn,vol}=cfg();
    _bgmGain?.gain.setTargetAtTime(musicOn?vol*0.28:0, c.currentTime, 0.4);
    _sfxGain?.gain.setTargetAtTime(sfxOn  ?vol      :0, c.currentTime, 0.06);
  }

  // Tek osilatör çalar
  function osc(freq, type, dur, amp, delay=0, dest=null) {
    const c=getCtx(); if(!c) return;
    const out=dest||_sfxGain; if(!out) return;
    try {
      const o=c.createOscillator(), g=c.createGain();
      o.connect(g); g.connect(out);
      o.type=type; o.frequency.setValueAtTime(freq, c.currentTime+delay);
      g.gain.setValueAtTime(0, c.currentTime+delay);
      g.gain.linearRampToValueAtTime(amp, c.currentTime+delay+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime+delay+dur);
      o.start(c.currentTime+delay); o.stop(c.currentTime+delay+dur+0.06);
    } catch(e){}
  }

  // BGM barını zamanlar ve bar süresini (sn) döner
  function scheduleBar(zone) {
    const c=getCtx(); if(!c||!_bgmGain) return 2.0;
    const {musicOn,vol}=cfg(); if(!musicOn) return 1.5;
    const sc=SCALES[zone]||SCALES[1], pat=PATTERNS[zone]||PATTERNS[1];
    const barDur=2.0, nDur=barDur/pat.length;

    // Melodi + oktav altı harmoni
    pat.forEach((idx,i)=>{
      osc(sc[idx],     'triangle', nDur*.85, vol*.22, i*nDur, _bgmGain);
      if(i%2===0)
        osc(sc[idx]/2, 'sine',     nDur*1.1, vol*.09, i*nDur, _bgmGain);
    });

    // Bass drone (low-pass filtreli)
    try {
      const c2=getCtx();
      const o=c2.createOscillator(), g=c2.createGain(), lp=c2.createBiquadFilter();
      lp.type='lowpass'; lp.frequency.value=280;
      o.connect(lp); lp.connect(g); g.connect(_bgmGain);
      o.type='sine'; o.frequency.value=sc[0]/2;
      const bv=vol*.13;
      g.gain.setValueAtTime(0, c2.currentTime);
      g.gain.linearRampToValueAtTime(bv, c2.currentTime+0.15);
      g.gain.setValueAtTime(bv, c2.currentTime+barDur-0.2);
      g.gain.exponentialRampToValueAtTime(0.0001, c2.currentTime+barDur+0.05);
      o.start(c2.currentTime); o.stop(c2.currentTime+barDur+0.1);
    } catch(e){}

    return barDur;
  }

  /* ── Public API ──────────────────────────────── */
  const api = {

    /** App() içinde, sr = useRef(makeDefault()) satırından sonra çağır */
    init(srRef) { _sr = srRef; },

    /** Zone değişince çağır */
    setZone(z) { _zone = z; },

    /** Slider/toggle her değiştiğinde çağır */
    onSettingsChange() {
      applyVol();
      if(cfg().musicOn && !_bgmActive) api.startBGM(_zone);
    },

    /** İlk kullanıcı tıklamasında çağır (browser autoplay policy) */
    startBGM(zone=1) {
      const c=getCtx(); if(!c) return;
      if(c.state==='suspended') c.resume().catch(()=>{});
      _bgmActive=true; _zone=zone; applyVol();
      const loop=()=>{
        if(!_bgmActive) return;
        const dur=scheduleBar(_zone);
        _bgmTimer=setTimeout(loop, dur*1000-60);
      };
      clearTimeout(_bgmTimer); loop();
    },

    stopBGM() {
      _bgmActive=false; clearTimeout(_bgmTimer);
      const c=getCtx();
      if(c&&_bgmGain) _bgmGain.gain.setTargetAtTime(0, c.currentTime, 0.6);
    },

    /* ── SFX koleksiyonu ── */
    sfx: {
      click()       { const {sfxOn:s,vol:v}=cfg(); if(!s)return; osc(900,'sine',.05,v*.18); },
      buy()         { const {sfxOn:s,vol:v}=cfg(); if(!s)return; osc(440,'sine',.1,v*.28); osc(660,'sine',.08,v*.22,.05); },
      buyMax()      { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [440,550,660,880].forEach((f,i)=>osc(f,'sine',.12,v*.28,i*.04)); },
      sell()        { const {sfxOn:s,vol:v}=cfg(); if(!s)return; osc(330,'triangle',.15,v*.22); },
      error()       { const {sfxOn:s,vol:v}=cfg(); if(!s)return; osc(180,'sawtooth',.18,v*.32); osc(130,'sawtooth',.22,v*.28,.1); },
      levelUp()     { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [523,659,784,1047].forEach((f,i)=>osc(f,'sine',.3,v*.32,i*.08)); },
      achievement() { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [659,784,988,1319].forEach((f,i)=>osc(f,'sine',.25,v*.28,i*.07)); },
      milestone()   { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [880,1100,1320].forEach((f,i)=>osc(f,'triangle',.2,v*.24,i*.06)); },
      save()        { const {sfxOn:s,vol:v}=cfg(); if(!s)return; osc(440,'sine',.1,v*.22); osc(550,'sine',.08,v*.18,.06); },
      zoneUp()      { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [523,659,784,1047,1319].forEach((f,i)=>osc(f,'sine',.4,v*.32,i*.1)); },
      event()       { const {sfxOn:s,vol:v}=cfg(); if(!s)return; [440,330,220].forEach((f,i)=>osc(f,'sawtooth',.15,v*.22,i*.05)); },
    },
  };
  return api;
})();

// ─── Geriye dönük uyumluluk ───────────────────────
// Oyundaki mevcut SFX.buy(), SFX.error() vs. çağrıları
// hiçbir değişiklik olmadan çalışmaya devam eder.
/* ══════════════════════════════════════════════════
   PARTICLE ENGINE — Canvas tabanlı neon piksel efekti

   API:
     particleEngine.onBuy(x, y, color?)
     particleEngine.onBuyMax(x, y, color?)
     particleEngine.onAchievement(x, y)
     particleEngine.onZoneUp(x, y)
     particleEngine.onLevelUp(x, y)
     particleEngine.onMilestone(x, y)
     particleEngine.onError(x, y)
     particleEngine.burst(x, y, opts?)   ← ham erişim
══════════════════════════════════════════════════ */
class ParticleEngine {
  constructor() {
    this._cvs     = null;
    this._ctx     = null;
    this._pool    = [];
    this._raf     = null;
    this._active  = false;
    this._boot();
  }

  /* ── Canvas kurulumu ──────────────────────── */
  _boot() {
    this._cvs = document.createElement('canvas');
    Object.assign(this._cvs.style, {
      position:'fixed', inset:'0',
      width:'100%', height:'100%',
      pointerEvents:'none', zIndex:'985',
    });
    this._fit();
    this._ctx = this._cvs.getContext('2d');
    document.body.appendChild(this._cvs);
    window.addEventListener('resize', () => this._fit(), { passive:true });
  }
  _fit() {
    this._cvs.width  = window.innerWidth;
    this._cvs.height = window.innerHeight;
  }

  /* ── Preset olaylar ───────────────────────── */
  onBuy(x, y, color) {
    const c = this._color(color);
    this.burst(x, y, { n:14, col:c, spd:[3,7],  sz:[2,5], lt:[.7,1.3], sh:['square','diamond'] });
  }
  onBuyMax(x, y, color) {
    const c = this._color(color) || '#39ff14';
    this.burst(x, y, { n:30, col:c, spd:[4,11], sz:[2,6], lt:[.9,1.9], sh:['square','diamond','circle'] });
  }
  onAchievement(x, y) {
    this.burst(x, y, { n:30, col:'#ffd700', spd:[5,13], sz:[3,7], lt:[1.2,2.2], sh:['star','diamond','circle'] });
    setTimeout(() =>
      this.burst(x, y, { n:14, col:'#ff00ff', spd:[3,7], sz:[2,5], lt:[.8,1.6], sh:['star','circle'] })
    , 130);
  }
  onZoneUp(x, y) {
    ['#ff00ff','#00d4ff','#ffd700','#39ff14'].forEach((c,i) =>
      setTimeout(() =>
        this.burst(x, y, { n:24, col:c, spd:[7,15], sz:[3,8], lt:[1.6,3.0], sh:['star','diamond','square','circle'] })
      , i * 70)
    );
  }
  onLevelUp(x, y) {
    this.burst(x, y, { n:22, col:'#a855f7', spd:[4,9], sz:[2,6], lt:[1.0,2.0], sh:['star','circle','diamond'] });
  }
  onMilestone(x, y) {
    this.burst(x, y, { n:18, col:'#00ffee', spd:[4,9], sz:[2,6], lt:[.9,1.8], sh:['diamond','circle'] });
  }
  onError(x, y) {
    this.burst(x, y, { n:9,  col:'#ff3535', spd:[2,5], sz:[2,4], lt:[.4,.9],  sh:['square'] });
  }

  /* ── Ham yayıcı ───────────────────────────── */
  burst(x, y, { n=12, col='#00d4ff', spd=[3,7], sz=[2,5], lt=[.7,1.4], sh=['square','circle'] } = {}) {
    for (let i = 0; i < n; i++) {
      const ang  = (Math.PI*2 * i/n) + (Math.random()-.5)*.9;
      const spd_ = spd[0] + Math.random()*(spd[1]-spd[0]);
      const life = lt[0]  + Math.random()*(lt[1] -lt[0]);
      this._pool.push({
        x, y,
        vx:  Math.cos(ang) * spd_ * (.55 + Math.random()*.45),
        vy:  Math.sin(ang) * spd_ * (.55 + Math.random()*.45) - Math.random()*2.8,
        sz:  sz[0] + Math.random()*(sz[1]-sz[0]),
        col: this._variant(col),
        glow: col,
        life,
        maxL: life,
        sh:   sh[Math.floor(Math.random()*sh.length)],
        rot:  Math.random()*Math.PI*2,
        rotV: (Math.random()-.5)*.17,
        grav: .11  + Math.random()*.09,
        drag: .974,
      });
    }
    if (!this._active) this._run();
  }

  /* ── Render döngüsü ───────────────────────── */
  _run() {
    this._active = true;
    const tick = () => {
      if (!this._pool.length) {
        this._active = false;
        this._ctx.clearRect(0, 0, this._cvs.width, this._cvs.height);
        return;
      }
      this._frame();
      this._raf = requestAnimationFrame(tick);
    };
    this._raf = requestAnimationFrame(tick);
  }

  _frame() {
    const ctx = this._ctx;
    const W = this._cvs.width, H = this._cvs.height;
    ctx.clearRect(0, 0, W, H);

    this._pool = this._pool.filter(p => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += p.grav;
      p.vx *= p.drag;
      p.vy *= p.drag;
      p.rot += p.rotV;
      p.life -= 1/60;

      if (p.life <= 0 || p.y > H + 60) return false;

      const t     = p.life / p.maxL;              // 1 → 0
      const alpha = t > .85 ? 1 : t / .85;        // hızlı giriş, yavaş çıkış
      const scale = .35 + t * .65;

      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = alpha;
      ctx.shadowBlur  = 12;
      ctx.shadowColor = p.glow;
      ctx.fillStyle   = p.col;
      this._draw(ctx, p.sh, p.sz * scale);
      ctx.restore();
      return true;
    });
  }

  /* ── Şekil çiziciler ──────────────────────── */
  _draw(ctx, sh, s) {
    const h = s * .5;
    if (sh === 'square') {
      ctx.fillRect(-h, -h, s, s);
    }
    else if (sh === 'circle') {
      ctx.beginPath(); ctx.arc(0, 0, h, 0, Math.PI*2); ctx.fill();
    }
    else if (sh === 'diamond') {
      ctx.beginPath();
      ctx.moveTo(0, -h*1.3); ctx.lineTo(h*.9, 0);
      ctx.lineTo(0,  h*1.3); ctx.lineTo(-h*.9, 0);
      ctx.closePath(); ctx.fill();
    }
    else if (sh === 'star') {
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const a1 = i*Math.PI*.8 - Math.PI*.5;
        const a2 = a1 + Math.PI*.4;
        const fn = i === 0 ? 'moveTo' : 'lineTo';
        ctx[fn](Math.cos(a1)*h,       Math.sin(a1)*h);
        ctx.lineTo(Math.cos(a2)*h*.37, Math.sin(a2)*h*.37);
      }
      ctx.closePath(); ctx.fill();
    }
  }

  /* ── Renk araçları ────────────────────────── */

  // CSS var() veya literal renk string'i çözümle
  _color(raw) {
    if (!raw) return this._accent();
    if (!raw.startsWith('var(')) return raw;
    try {
      const prop = raw.match(/var\(([^)]+)\)/)?.[1]?.trim();
      return getComputedStyle(document.querySelector('.app') || document.documentElement)
        .getPropertyValue(prop).trim() || this._accent();
    } catch { return this._accent(); }
  }

  // Aktif zone-accent rengini al
  _accent() {
    try {
      return getComputedStyle(document.querySelector('.app') || document.documentElement)
        .getPropertyValue('--zone-accent').trim() || '#00d4ff';
    } catch { return '#00d4ff'; }
  }

  // Parçacıklara hafif hue/parlaklık varyasyonu
  _variant(hex) {
    if (!hex || !hex.startsWith('#')) return hex || '#00d4ff';
    const h6 = hex.length === 4
      ? '#' + hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]
      : hex;
    const r = parseInt(h6.slice(1,3),16)/255;
    const g = parseInt(h6.slice(3,5),16)/255;
    const b = parseInt(h6.slice(5,7),16)/255;
    const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
    let hh=0, s=0, l=(mx+mn)/2;
    if (mx !== mn) {
      const d=mx-mn;
      s = l>.5 ? d/(2-mx-mn) : d/(mx+mn);
      if (mx===r)      hh=((g-b)/d+(g<b?6:0))/6;
      else if (mx===g) hh=((b-r)/d+2)/6;
      else             hh=((r-g)/d+4)/6;
    }
    hh = ((hh*360 + (Math.random()-.5)*24) + 360) % 360;
    l  = Math.max(.44, Math.min(.88, l + (Math.random()-.5)*.22));
    return `hsl(${hh|0},${(s*100)|0}%,${(l*100)|0}%)`;
  }

  destroy() {
    cancelAnimationFrame(this._raf);
    this._cvs?.remove();
  }
}

/* Singleton — oyunun her yerinden erişilir */
const particleEngine = new ParticleEngine();
const SFX = audioManager.sfx;
/* ══════════════════════════════════════════════════
   SETTINGS MODAL — Ses Ayarları
   
   Props:
     sr          — useRef(makeDefault()), App'in sr'si
     onClose     — () => setShowAudio(false)
     forceUpdate — () => setTick(t => t+1)
══════════════════════════════════════════════════ */
function SettingsModal({ sr, onClose, forceUpdate }) {
  const s       = sr.current;
  const vol     = s.audioVolume ?? 0.5;
  const musicOn = s.musicOn !== false;
  const sfxOn   = s.sfxOn   !== false;
  const pct     = Math.round(vol * 100);

  const apply = (patch) => {
    Object.assign(sr.current, patch);
    audioManager.onSettingsChange();
    forceUpdate();
  };

  const TOGGLES = [
    {
      key:'musicOn', icon: musicOn ? '🎵' : '🎵',
      label:'ARKAPLAN MÜZİĞİ',
      sub:   musicOn ? 'BGM aktif — bölge teması çalıyor' : 'Müzik kapalı',
      on:    musicOn,
      fn:    () => apply({ musicOn: !musicOn }),
    },
    {
      key:'sfxOn', icon:'🔊',
      label:'SES EFEKTLERİ',
      sub:   sfxOn ? 'Tıklama · Satın alma · Hata · Çağ atlama' : 'Efektler kapalı',
      on:    sfxOn,
      fn:    () => apply({ sfxOn: !sfxOn }),
    },
  ];

  const SFX_TESTS = [
    ['🖱️ Tıklama', () => audioManager.sfx.click()],
    ['💰 Satın Al', () => audioManager.sfx.buy()],
    ['❌ Hata',     () => audioManager.sfx.error()],
    ['🌐 Çağ Atla', () => audioManager.sfx.zoneUp()],
  ];

  return (

/* OLD SFX REMOVED */ const OLD_SFX={
  _ctx:null,_vol:0.25,
  _init(){if(!this._ctx)try{this._ctx=new(window.AudioContext||window.webkitAudioContext)();}catch{}},
  _play(freq,type,dur,vol,delay=0){
    this._init();if(!this._ctx||!this._vol)return;
    try{
      const o=this._ctx.createOscillator(),g=this._ctx.createGain();
      o.connect(g);g.connect(this._ctx.destination);
      o.type=type;o.frequency.setValueAtTime(freq,this._ctx.currentTime+delay);
      const v=(vol||.2)*this._vol;
      g.gain.setValueAtTime(0,this._ctx.currentTime+delay);
      g.gain.linearRampToValueAtTime(v,this._ctx.currentTime+delay+.02);
      g.gain.exponentialRampToValueAtTime(.001,this._ctx.currentTime+delay+dur);
      o.start(this._ctx.currentTime+delay);o.stop(this._ctx.currentTime+delay+dur+.05);
    }catch{}
  },
  buy(){this._play(440,'sine',.1);this._play(660,'sine',.08,.15,.05);},
  buyMax(){[440,550,660,880].forEach((f,i)=>this._play(f,'sine',.12,.2,i*.04));},
  sell(){this._play(330,'triangle',.15);},
  error(){this._play(150,'sawtooth',.2,.3);},
  levelUp(){[523,659,784,1047].forEach((f,i)=>this._play(f,'sine',.3,.3,i*.08));},
  achievement(){[659,784,988,1319].forEach((f,i)=>this._play(f,'sine',.25,.25,i*.07));},
  milestone(){[880,1100,1320].forEach((f,i)=>this._play(f,'triangle',.2,.2,i*.06));},
  save(){this._play(440,'sine',.1);this._play(550,'sine',.08,.15,.06);},
  zoneAdvance(){[523,659,784,1047,1319].forEach((f,i)=>this._play(f,'sine',.4,.35,i*.1));},
  event(){[440,330,220].forEach((f,i)=>this._play(f,'sawtooth',.15,.2,i*.05));},
};

function spawnFloatNum(x,y,text,color){
  const el=document.createElement('div');
  el.className='float-num';el.textContent=text;
  el.style.cssText=`left:${x}px;top:${y}px;color:${color||'#ffd700'};`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1500);
}
function spawnBurst(x,y,color,count=8){
  for(let i=0;i<count;i++){
    const el=document.createElement('div');el.className='burst-particle';
    const angle=(i/count)*Math.PI*2,dist=25+Math.random()*45;
    el.style.cssText=`left:${x}px;top:${y}px;width:${3+Math.random()*5}px;height:${3+Math.random()*5}px;background:${color};--tx:${Math.cos(angle)*dist}px;--ty:${Math.sin(angle)*dist}px;--dur:${.35+Math.random()*.4}s;`;
    document.body.appendChild(el);setTimeout(()=>el.remove(),750);
  }
}
function spawnCoinRain(count=12){
  const wrap=document.createElement('div');wrap.className='coin-rain';
  for(let i=0;i<count;i++){
    const c=document.createElement('div');c.className='coin';
    c.textContent=['💰','💵','💸','🪙'][i%4];
    c.style.cssText=`left:${Math.random()*100}%;--dur:${1+Math.random()*1.5}s;--delay:${Math.random()*.5}s;`;
    wrap.appendChild(c);
  }
  document.body.appendChild(wrap);setTimeout(()=>wrap.remove(),3000);
}

/* ════════════════════════════════════════════════════════════════
   ③ ResearchTreePanel  —  App fonksiyonundan ÖNCE tanımla
   ════════════════════════════════════════════════════════════════ */
const ResearchTreePanel=React.memo(function ResearchTreePanel({s,unlockResearch,fmtNum}){
  const [selId,setSelId]=useState(null);

  const done=useMemo(()=>new Set(s.researchUnlocked||[]),[s.researchUnlocked]);

  // Düğüm görünür mü? (prereq tamamlandıysa veya kök tier ise)
  const visible=useCallback((r)=>{
    if(r.id==='r_root') return (s.zone||1)>=2;
    // Gizli araştırmalar: prereq yoksa kök açıldıktan sonra (???) olarak göster
    if(!r.req) return done.has('r_root');
    return done.has(r.req);
  },[done,s.zone]);

  // Gizli araştırma gerçekten açıldı mı?
  const revealed=useCallback((r)=>{
    if(!r.secretCond) return true;
    return r.secretCond(s);
  },[s]);

  // Düğüm durumu
  const nodeState=useCallback((r)=>{
    if(done.has(r.id)) return 'done';
    const reqOk =!r.req||done.has(r.req);
    const zoneOk=!r.zone||(s.zone||1)>=(r.zone||1);
    if(!reqOk||!zoneOk) return 'locked';
    return s.researchPoints>=r.cost ? 'avail' : 'poor';
  },[done,s]);

  const STEP=64, CS=60;
  const OCT="polygon(29.3% 0%,70.7% 0%,100% 29.3%,100% 70.7%,70.7% 100%,29.3% 100%,0% 70.7%,0% 29.3%)";
  const cW=6*STEP+CS+16, cH=8*STEP+CS+16;

  const visNodes=useMemo(()=>RESEARCH_TREE.filter(r=>visible(r)&&RPOS[r.id]),[visible]);

  // Normal kenarlar (prereq → node)
  const edges=useMemo(()=>{
    const list=[];
    const byId=Object.fromEntries(RESEARCH_TREE.map(r=>[r.id,r]));
    visNodes.forEach(r=>{
      if(!r.req) return;
      const par=byId[r.req];
      if(par&&visible(par)&&RPOS[r.req])
        list.push({fromId:r.req,toId:r.id,eff:r.effect});
    });
    // r_gizli3 için özel çift kenar (gizli1 + gizli2 → gizli3)
    if(visible({id:'r_gizli3',req:undefined})&&RPOS.r_gizli3){
      ['r_gizli1','r_gizli2'].forEach(pid=>{
        if(done.has(pid))
          list.push({fromId:pid,toId:'r_gizli3',eff:'prodMulti'});
      });
    }
    return list;
  },[visNodes,visible,done]);

  const selR=selId?RESEARCH_TREE.find(r=>r.id===selId):null;
  const em =r=>EFFECT_META[r.effect]||EFFECT_META.none;

  return (
    <div className="rta-wrap">

      {/* ── Sol: Ağaç ── */}
      <div className="rta-left">

        {/* RP çubuğu */}
        <div className="rta-rpbar">

function fmtNum(n){
  if(n===undefined||n===null||isNaN(n))return'0';
  const a=Math.abs(n);
  if(a>=1e15)return(n/1e15).toFixed(2)+'Qa';
  if(a>=1e12)return(n/1e12).toFixed(2)+'T';
  if(a>=1e9) return(n/1e9).toFixed(2)+'B';
  if(a>=1e6) return(n/1e6).toFixed(2)+'M';
  if(a>=1e3) return(n/1e3).toFixed(1)+'K';
  if(a<1&&a>0)return n.toFixed(3);
  return Math.floor(n).toLocaleString('tr-TR');
}
function fmtRate(n){
  if(!n||isNaN(n)||n===0)return'0/s';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B/s';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M/s';
  if(n>=1e3)return(n/1e3).toFixed(1)+'K/s';
  if(n<0.001&&n>0)return n.toFixed(5)+'/s';
  return n.toFixed(3)+'/s';
}

function getResearchBonuses(s){
  const b={prodMulti:1,energyMulti:1,wageMulti:1,capBonus:0,xpMulti:1,moneyMulti:1,rpMulti:1};
  (s.researchUnlocked||[]).forEach(rid=>{
    const r=RESEARCH_TREE.find(x=>x.id===rid);if(!r)return;
    switch(r.effect){
      case'prodMulti': b.prodMulti +=r.value;break;
      case'energyMulti':b.energyMulti+=r.value;break;
      case'wageMulti': b.wageMulti +=r.value;break;
      case'capBonus':  b.capBonus  +=r.value;break;
      case'xpMulti':   b.xpMulti   +=r.value;break;
      case'moneyMulti':b.moneyMulti+=r.value;break;
      case'rpMulti':   b.rpMulti   +=r.value;break;
    }
  });
  // Prestige bonuses
  const pc=s.prestigeCount||0;
  if(pc>0){b.prodMulti+=pc*0.5;b.moneyMulti+=pc*0.3;b.xpMulti+=pc*0.2;}
  // Prestige tech bonuses
  (s.prestigeTechs||[]).forEach(tid=>{
    const pt=PRESTIGE_TECHS.find(x=>x.id===tid);if(!pt)return;
    switch(pt.effect){
      case'prodBonus':  b.prodMulti +=pt.value;break;
      case'moneyBonus': b.moneyMulti+=pt.value;break;
      case'xpBonus':    b.xpMulti   +=pt.value;break;
      case'rpBonus':    b.rpMulti   +=pt.value;break;
      case'wageBonus':  b.wageMulti +=pt.value;break;
      case'capBonus':   b.capBonus  +=pt.value;break;
    }
  });
  return b;
}

function getBuildingUpgradeMult(s,bId){
  const lvl=(s.bldUpgrades||{})[bId]||0;
  if(lvl===0)return 1;
  const ul=UPGRADE_LEVELS[lvl-1];
  return ul?ul.mult:1;
}

function getUpgradeCost(b,currentLevel,diffCostMult){
  const ul=UPGRADE_LEVELS[currentLevel];
  if(!ul)return Infinity;
  return Math.floor(b.cost*diffCostMult*ul.costMult);
}

function getActiveEventMultipliers(s){
  const m={prod:1,rp:1,energy:1,xp:1,wage:1,stopProd:false};
  if(!s.activeRandomEvent)return m;
  const ev=s.activeRandomEvent;
  switch(ev.effect){
    case'stop_prod': m.stopProd=true;break;
    case'prod_x2':   m.prod*=2;break;
    case'rp_x3':     m.rp*=3;break;
    case'energy_x2': m.energy*=2;break;
    case'no_wage':   m.wage=0;break;
    case'xp_x5':     m.xp*=5;break;
    case'prod_half':  m.prod*=0.5;break;
  }
  return m;
}

function getMarketPrice(s,res){
  const base=SELL_PRICES[res]||0;
  const ev=s.activeMarketEvent;
  if(!ev)return base;
  if(ev.resources.includes('ALL'))return base*ev.mult;
  if(ev.resources.includes(res))return base*ev.mult;
  return base;
}

}
function doLoad(){
