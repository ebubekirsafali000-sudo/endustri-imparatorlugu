}

const ResearchTreePanel=React.memo(function ResearchTreePanel({s,unlockResearch,fmtNum}){
  const [selId,setSelId]=useState(null);

  const done=useMemo(()=>new Set(s.researchUnlocked||[]),[s.researchUnlocked]);

  // Düğüm görünür mü? (prereq tamamlandıysa veya kök tier ise)
  const visible=useCallback((r)=>{
    if(r.id==='r_root') return (s.zone||1)>=2;
    // Gizli araştırmalar: prereq yoksa kök açıldıktan sonra (???) olarak göster
    if(!r.req) return done.has('r_root');
    return done.has(r.req);
  },[done,s.zone]);

  // Gizli araştırma gerçekten açıldı mı?
  const revealed=useCallback((r)=>{
    if(!r.secretCond) return true;
    return r.secretCond(s);
  },[s]);

  // Düğüm durumu
  const nodeState=useCallback((r)=>{
    if(done.has(r.id)) return 'done';
    const reqOk =!r.req||done.has(r.req);
    const zoneOk=!r.zone||(s.zone||1)>=(r.zone||1);
    if(!reqOk||!zoneOk) return 'locked';
    return s.researchPoints>=r.cost ? 'avail' : 'poor';
  },[done,s]);

  const STEP=64, CS=60;
  const OCT="polygon(29.3% 0%,70.7% 0%,100% 29.3%,100% 70.7%,70.7% 100%,29.3% 100%,0% 70.7%,0% 29.3%)";
  const cW=6*STEP+CS+16, cH=8*STEP+CS+16;

  const visNodes=useMemo(()=>RESEARCH_TREE.filter(r=>visible(r)&&RPOS[r.id]),[visible]);

  // Normal kenarlar (prereq → node)
  const edges=useMemo(()=>{
    const list=[];
    const byId=Object.fromEntries(RESEARCH_TREE.map(r=>[r.id,r]));
    visNodes.forEach(r=>{
      if(!r.req) return;
      const par=byId[r.req];
      if(par&&visible(par)&&RPOS[r.req])
        list.push({fromId:r.req,toId:r.id,eff:r.effect});

function App(){
  const sr=useRef(makeDefault()); useEffect(()=>{ audioManager.init(sr.current); },[]);
  const [tick,setTick]=useState(0);
  const [tab,setTab]=useState('buildings');
  const [paused,setPaused]=useState(false);
  const [speed,setSpeed]=useState(1);
  const [toasts,setToasts]=useState([]);
  const [zoneFilter,setZoneFilter]=useState(1);
  const [zoneOverlay,setZoneOverlay]=useState(null);
  const [showMenu,setShowMenu]=useState(true); const [showAudio,setShowAudio]=useState(false); const forceUpdate=useCallback(()=>setTick(t=>t+1),[]);
  const [selectedDiff,setSelectedDiff]=useState('normal');
  const [levelFlash,setLevelFlash]=useState(false);
  const [levelNum,setLevelNum]=useState(null);
  const [achPopup,setAchPopup]=useState(null);
  const [eventPopup,setEventPopup]=useState(null);
  const [milestones,setMilestones]=useState([]);
  const [justBought,setJustBought]=useState(null);
  const [autoSellEnabled,setAutoSellEnabled]=useState(true);
  const [manualSellAmts,setManualSellAmts]=useState({});
  const [marketAmts,setMarketAmts]=useState({});
  const [godMode,setGodMode]=useState(false);
  const [godLevelMult,setGodLevelMult]=useState(10);

  const rafRef=useRef(null);
  const lastRef=useRef(null);
  const autoSaveTimer=useRef(0);
  const pausedR=useRef(false);
  const speedR=useRef(1);
  const autoSellR=useRef(true);
  const godModeR=useRef(false);
  const godLevelMultR=useRef(10);
  const achCheckedR=useRef(new Set());

  pausedR.current=paused;
  speedR.current=speed;
  autoSellR.current=autoSellEnabled;
  godModeR.current=godMode;
  godLevelMultR.current=godLevelMult;

  /* ── Toast ── */
  const addToast=useCallback((msg,type='info')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t.slice(-4),{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3200);
  },[]);

  /* ── Message log ── */
  const addMsg=useCallback((type,text)=>{
    const s=sr.current;
    s.messages=[{id:Date.now()+Math.random(),type,text,time:new Date().toLocaleTimeString('tr-TR')},...s.messages].slice(0,80);
  },[]);

  /* ── Achievement check ── */
  const checkAchievements=useCallback((s)=>{
    ACHIEVEMENTS.forEach(a=>{
      if(achCheckedR.current.has(a.id)||s.achievements.includes(a.id))return;
      if(a.check(s)){
        s.achievements=[...s.achievements,a.id];
        achCheckedR.current.add(a.id);
        a.bonus(s);
        addMsg('achievement',`🏆 Başarı: "${a.name}" — ${a.reward}`);
        addToast(`🏆 ${a.name}`,'achievement-t');
        SFX.achievement();spawnCoinRain(15);
        setAchPopup({...a,key:Date.now()});
        setTimeout(()=>setAchPopup(null),3700);
      }
    });
  },[addMsg,addToast]);

  /* ══════════════════════════════════════════════
     GAME LOOP
  ══════════════════════════════════════════════ */
  const gameLoop=useCallback((ts)=>{
    if(lastRef.current===null)lastRef.current=ts;
    const raw=(ts-lastRef.current)/1000;
    lastRef.current=ts;
    const dt=Math.min(raw,.1);

    if(!pausedR.current){
      const spd=speedR.current;
      const eff=dt*spd;
      const s=sr.current;
      const diff=DIFFICULTIES[s.difficulty||'normal']||DIFFICULTIES.normal;

      s.playTime+=dt;
      autoSaveTimer.current+=dt;
      if(autoSaveTimer.current>=30){autoSaveTimer.current=0;doSave(s);}

      const rb=getResearchBonuses(s);
      const gm=godModeR.current;

      /* ── Active event multipliers ── */
      const evMult=getActiveEventMultipliers(s);

      /* ── Market event timer ── */
      s.nextMarketEventIn=(s.nextMarketEventIn||120)-eff;
      if(s.nextMarketEventIn<=0&&!s.activeMarketEvent){
        const ev=MARKET_EVENTS[Math.floor(Math.random()*MARKET_EVENTS.length)];
        s.activeMarketEvent={...ev};
        s.marketEventTimer=ev.duration;
        s.nextMarketEventIn=180+Math.random()*120;
        SFX.event();
        addMsg('warning',`📈 Pazar Olayı: ${ev.name} — ${ev.desc}`);
        addToast(`📈 ${ev.name}`,'event-t');
      }
      if(s.activeMarketEvent){
        s.marketEventTimer=(s.marketEventTimer||0)-eff;
        if(s.marketEventTimer<=0)s.activeMarketEvent=null;
      }

      /* ── Random event timer ── */
      s.nextRandomEventIn=(s.nextRandomEventIn||180)-eff;
      if(s.nextRandomEventIn<=0&&!s.activeRandomEvent){
        const ev=RANDOM_EVENTS[Math.floor(Math.random()*RANDOM_EVENTS.length)];
        s.activeRandomEvent={...ev};
        s.randomEventTimer=ev.duration||0;
        s.nextRandomEventIn=240+Math.random()*180;
        s.eventsLived=(s.eventsLived||0)+1;
        SFX.event();
        // Instant effects
        if(ev.effect==='tax5pct'){const tax=s.money*.05;s.money=Math.max(0,s.money-tax);addMsg('error',`💼 Vergi denetimi: -${fmtNum(tax)} TL`);}
        if(ev.effect==='meteor_strike'){
          const keys=Object.keys(s.resources).filter(k=>s.resources[k]>1);
          if(keys.length>0){const k=keys[Math.floor(Math.random()*keys.length)];const loss=s.resources[k]*.3;s.resources[k]-=loss;addMsg('error',`☄️ Meteor: ${RES_NAMES[k]||k} -%30`);}
        }
        if(ev.effect==='rp_gift'){s.researchPoints+=1000;addMsg('success','🎁 Araştırma hediyesi: +1000 RP!');}
        if(ev.effect==='money_x10'){const bonus=(s.resRates['TL']||1)*10;s.money+=bonus;s.totalEarned+=bonus;addMsg('success',`💸 Para yağmuru: +${fmtNum(bonus)} TL`);}
        if(ev.effect==='res_bonus'){Object.keys(s.resources).filter(k=>s.resources[k]>0).forEach(k=>{s.resources[k]=(s.resources[k]||0)+100;});addMsg('success','🔭 Büyük Keşif: +100 tüm kaynaklar!');}
        addMsg('event',`${ev.good?'✨':'⚠️'} Olay: ${ev.name} — ${ev.desc}`);
        addToast(`${ev.good?'✨':'⚠️'} ${ev.name}`,'event-t');
        setEventPopup({...ev,key:Date.now()});
        setTimeout(()=>setEventPopup(null),4500);
        if(ev.duration===0)s.activeRandomEvent=null;
      }
      if(s.activeRandomEvent&&s.randomEventTimer>0){
        s.randomEventTimer-=eff;
        if(s.randomEventTimer<=0)s.activeRandomEvent=null;
      }

      /* ── Energy calc ── */
      let ep=0,ec=0;
      ALL_BUILDINGS.forEach(b=>{
        const c=s.bldCounts[b.id]||0;if(c<=0)return;
        if(b.energyProd>0)ep+=b.energyProd*c;
        if(b.energyUse>0){
          const eMult=s.activeMarketEvent?.energyMult||1;
          ec+=b.energyUse*c*Math.max(.1,1+rb.energyMulti)*eMult;
        }
      });
      s.energyProd=ep;s.energyCons=ec;
      const eOk=ep>=ec;

      /* ── Worker wages ── */
      const wageScale=evMult.wage;
      if(wageScale>0){
        let totalWage=0;
        ALL_BUILDINGS.forEach(b=>{const c=s.bldCounts[b.id]||0;if(c>0)totalWage+=b.workerWage*b.workers*c;});
        totalWage*=wageScale*Math.max(.1,1+rb.wageMulti)*diff.wageMult;
        s.money=Math.max(0,s.money-(totalWage/60)*eff);
      }

      /* ── Capacity ── */
      const depoCnt=s.bldCounts['akilli_depo']||0;
      const maxCap=500+depoCnt*500+rb.capBonus;

      /* ── Production ── */
      const newRates={};
      const prodMod=evMult.stopProd?0:evMult.prod;
      const terraBonus=1+Math.min(.5,(s.bldCounts['terraforming']||0)*.02);
      // Gıda bonus: her biyodome koloniye %2 ekstra üretim
      const bioBonus=1+Math.min(.4,(s.bldCounts['biyodome']||0)*.02);
      // Atmosfer bonus (Mars atmosferi)
      const atmosBonus=1+Math.min(.3,(s.resources.atmosfer||0)*.001);

      if(prodMod>0){
        ALL_BUILDINGS.forEach(b=>{
          const c=s.bldCounts[b.id]||0;if(c<=0)return;
          if(b.output===''&&b.energyProd>0)return;
          if(b.energyUse>0&&b.energyProd===0&&!eOk)return;

          /* Input consumption fraction */
          let fraction=1;
          if(b.inputs.length>0){
            for(let i=0;i<b.inputs.length;i+=2){
              const res=b.inputs[i],need=b.inputs[i+1];
              const required=need*c*b.rate*eff;
              if(required>0){const frac=(s.resources[res]||0)/required;if(frac<fraction)fraction=frac;}
            }
            fraction=Math.max(0,Math.min(1,fraction));
          }
          if(fraction<=0)return;

          /* Consume inputs */
          for(let i=0;i<b.inputs.length;i+=2){
            const res=b.inputs[i],need=b.inputs[i+1];
            s.resources[res]=Math.max(0,(s.resources[res]||0)-need*c*b.rate*eff*fraction);
          }

          /* Multipliers */
          const upgMult=getBuildingUpgradeMult(s,b.id);
          let outMulti=rb.prodMulti*terraBonus*bioBonus*atmosBonus*(s.prestigeBonus||1)*prodMod*upgMult;
          if(gm)outMulti*=100;

          let gain=b.rate*c*eff*fraction*outMulti;

          if(b.output==='TL'){
            gain*=rb.moneyMulti;
            s.money+=gain;s.totalEarned+=gain;
            newRates['TL']=(newRates['TL']||0)+b.rate*c*fraction*outMulti*rb.moneyMulti;
          } else if(b.output==='RP'){
            gain*=rb.rpMulti*(evMult.rp||1);
            s.researchPoints+=gain;
            newRates['RP']=(newRates['RP']||0)+b.rate*c*fraction*outMulti*rb.rpMulti*(evMult.rp||1);
          } else if(b.output&&b.output!==''){
            s.resources[b.output]=Math.min((s.resources[b.output]||0)+gain,maxCap);
            newRates[b.output]=(newRates[b.output]||0)+b.rate*c*fraction*outMulti;
          }
        });
      }
      s.resRates=newRates;

      /* ── Auto sell ── */
      if(autoSellR.current){
        Object.keys(AUTO_SELL_RES).forEach(res=>{
          const amt=s.resources[res]||0;
          if(amt>1){
            const sold=amt*.1;
            s.resources[res]=Math.max(0,amt-sold);
            const price=getMarketPrice(s,res);
            const income=sold*price;
            s.money+=income;s.totalEarned+=income;
          }
        });
      }

      /* ── Trade routes passive income ── */
      (s.activeTradeRoutes||[]).forEach(rtId=>{
        const rt=TRADE_ROUTES.find(x=>x.id===rtId);if(!rt)return;
        const income=rt.incomePerSec*eff*(s.prestigeBonus||1)*(evMult.stopProd?0:1);
        s.money+=income;s.totalEarned+=income;
        if(rt.rpPerSec>0)s.researchPoints+=rt.rpPerSec*eff;
        newRates['TL']=(newRates['TL']||0)+rt.incomePerSec*(s.prestigeBonus||1);
      });

      /* ── XP ── */
      const xpGm=gm?Math.pow(godLevelMultR.current,Math.min(s.level,15)):1;
      const xpMod=(evMult.xp||1);
      s.xp+=eff*(0.5+s.zone*.3)*rb.xpMulti*(diff.xpMult||1)*xpGm*xpMod;
      const needed=XP_PER_LEVEL(s.level);
      if(s.xp>=needed){
        s.xp-=needed;s.level+=1;
        setLevelFlash(true);setTimeout(()=>setLevelFlash(false),1800);
        setLevelNum(s.level);setTimeout(()=>setLevelNum(null),2100);
        SFX.levelUp();
        addMsg('success',`🎉 SEVİYE ${s.level}! Yeni rekor!`);
        addToast(`⬆️ Seviye ${s.level}!`);
      }

      /* ── Contract timer ── */
      if(s.activeContract){
        s.activeContract.remaining-=eff;
        if(s.activeContract.remaining<=0){
          addMsg('error',`❌ Sözleşme süresi doldu: ${s.activeContract.label}`);
          addToast('⏱️ Sözleşme süresi doldu!');
          s.activeContract=null;
        }
      }

      /* ── Expedition timer ── */
      if(s.activeExpedition){
        s.activeExpedition.remaining-=eff;
        if(s.activeExpedition.remaining<=0){
          const exp=s.activeExpedition;
          const expType=EXPEDITION_TYPES.find(e=>e.id===exp.typeId);
          if(expType){
            const roll=Math.random();
            let cum=0,outcome=expType.outcomes[expType.outcomes.length-1];
            for(const o of expType.outcomes){cum+=o.chance;if(roll<=cum){outcome=o;break;}}
            const mGain=outcome.money[0]+Math.random()*(outcome.money[1]-outcome.money[0]);
            const rGain=outcome.rp[0]+Math.random()*(outcome.rp[1]-outcome.rp[0]);
            s.money+=mGain;s.totalEarned+=mGain;s.researchPoints+=rGain;
            let resText='';
            if(outcome.resource){
              Object.entries(outcome.resource).forEach(([res,range])=>{
                const amt=range[0]+Math.random()*(range[1]-range[0]);
                s.resources[res]=(s.resources[res]||0)+amt;
                resText+=` +${fmtNum(amt)} ${RES_NAMES[res]||res}`;
              });
            }
            s.expeditionsCompleted=(s.expeditionsCompleted||0)+1;
            s.activeExpedition=null;
            if(mGain>0){SFX.achievement();spawnCoinRain(10);addMsg('success',`🚀 Keşif: ${outcome.label} +${fmtNum(mGain)} TL${rGain>0?` +${fmtNum(rGain)} RP`:''}${resText}`);}
            else{SFX.error();addMsg('error',`🚀 Keşif başarısız: ${outcome.label}`);}
            addToast(`🚀 ${outcome.label}`);
          }
        }
      }

      /* ── Milestone checks ── */
      if(!s._ms)s._ms={};
      [1000,10000,100000,1e6,1e7,1e8,1e9,1e10,1e12,1e15].forEach(m=>{
        if(s.money>=m&&!s._ms[m]){
          s._ms[m]=true;SFX.milestone();
          const id=Date.now()+Math.random();
          setMilestones(ms=>[...ms,{id,text:`💎 ${fmtNum(m)} TL!`}]);
          setTimeout(()=>setMilestones(ms=>ms.filter(x=>x.id!==id)),3000);
        }
      });

      checkAchievements(s);
    }

    setTick(t=>t+1);
    rafRef.current=requestAnimationFrame(gameLoop);
  },[addMsg,addToast,checkAchievements]);

  /* ── Init ── */
  useEffect(()=>{
    const saved=doLoad();
    if(saved){
      sr.current={...makeDefault(saved.difficulty||'normal'),...saved};
      if(saved.achievements)saved.achievements.forEach(a=>achCheckedR.current.add(a));
      addToast('💾 Kayıt yüklendi');
      setShowMenu(false);
    }
    rafRef.current=requestAnimationFrame(gameLoop);
    return()=>{if(rafRef.current)cancelAnimationFrame(rafRef.current);};
  },[gameLoop]);

  const s=sr.current;
  const diff=DIFFICULTIES[s.difficulty||'normal']||DIFFICULTIES.normal;
  const zInfo=ZONE_INFO[Math.min((s.zone||1),8)-1]||ZONE_INFO[0];

  /* ══════════════════════════════════════════════
     ACTIONS
  ══════════════════════════════════════════════ */

  const buyBuilding=useCallback((bId,maxMode,evtX,evtY)=>{
    const b=ALL_BUILDINGS.find(x=>x.id===bId);if(!b||!sr.current.bldUnlocked[bId])return;
    const st=sr.current;
    const dc=DIFFICULTIES[st.difficulty||'normal']||DIFFICULTIES.normal;
    if(maxMode){
      let bought=0;
      for(;;){
        const c=st.bldCounts[bId]||0;
        const cost=Math.floor(b.cost*dc.costMult*Math.pow(1.15,c));
        if(st.money<cost||bought>=500)break;
        st.money-=cost;st.bldCounts[bId]=c+1;st.totalBuildings+=1;st.xp+=10;bought++;
      }
      if(bought>0){
        SFX.buyMax();
        if(evtX){spawnBurst(evtX,evtY,'#ffd700',14);spawnFloatNum(evtX-20,evtY-20,`×${bought}`,'#ffd700');}
        setJustBought(bId);setTimeout(()=>setJustBought(null),500);
        addMsg('success',`✅ ${b.name} ×${bought} inşa edildi`);addToast(`+${bought} ${b.name}`);
      } else{SFX.error();addToast('💸 Yetersiz para!');}
    } else {
      const c=st.bldCounts[bId]||0;
      const cost=Math.floor(b.cost*dc.costMult*Math.pow(1.15,c));
      if(st.money<cost){SFX.error();addToast('💸 Yetersiz para!');return;}
      st.money-=cost;st.bldCounts[bId]=c+1;st.totalBuildings+=1;st.xp+=10;
      SFX.buy(); if(typeof e !== "undefined" && e.clientX) particleEngine.onBuy(e.clientX, e.clientY);
      if(evtX){spawnBurst(evtX,evtY,'#00d4ff',7);if(cost>500)spawnFloatNum(evtX-30,evtY-25,`-${fmtNum(cost)}`,'#ff6b35');}
      setJustBought(bId);setTimeout(()=>setJustBought(null),500);
      if(c===0)addMsg('success',`🏗️ ${b.name} inşa edildi!`);
    }
  },[addMsg,addToast]);

  const sellBuilding=useCallback((bId)=>{
    const b=ALL_BUILDINGS.find(x=>x.id===bId);if(!b)return;
    const st=sr.current;const c=st.bldCounts[bId]||0;if(c<=0)return;
    const dc=DIFFICULTIES[st.difficulty||'normal']||DIFFICULTIES.normal;
    const refund=Math.floor(b.cost*dc.costMult*Math.pow(1.15,c-1)*.5);
    st.money+=refund;st.bldCounts[bId]=c-1;st.totalBuildings=Math.max(0,st.totalBuildings-1);
    SFX.sell();addToast(`💰 +${fmtNum(refund)} TL (satış)`);
  },[addToast]);

  const upgradeBuilding=useCallback((bId,evtX,evtY)=>{
    const b=ALL_BUILDINGS.find(x=>x.id===bId);if(!b)return;
    const st=sr.current;
    if(!st.bldUpgrades)st.bldUpgrades={};
    const curLvl=st.bldUpgrades[bId]||0;
    if(curLvl>=UPGRADE_LEVELS.length){addToast('✅ Maksimum yükseltme!');return;}
    if((st.bldCounts[bId]||0)<1){addToast('❌ Önce binayı inşa et!');return;}
    const dc=DIFFICULTIES[st.difficulty||'normal']||DIFFICULTIES.normal;
    const cost=getUpgradeCost(b,curLvl,dc.costMult);
    if(st.money<cost){SFX.error();addToast(`💸 ${fmtNum(cost)} TL gerekiyor!`);return;}
    st.money-=cost;st.bldUpgrades[bId]=curLvl+1;
    st.upgradesDone=(st.upgradesDone||0)+1;
    const ul=UPGRADE_LEVELS[curLvl];
    SFX.achievement();
    if(evtX)spawnBurst(evtX,evtY,'#ffd700',12);
    addToast(`⬆️ ${b.name} — ${ul.label}!`);
    addMsg('success',`⬆️ ${b.name} ${ul.label} oldu! Üretim ×${ul.mult}`);
  },[addToast,addMsg]);

  const manualSell=useCallback((res,amtStr,evtX,evtY)=>{
    const st=sr.current;
    const price=getMarketPrice(st,res);const have=st.resources[res]||0;
    const amt=Math.min(parseFloat(amtStr)||have,have);
    if(amt<=0||price<=0)return;
    st.resources[res]=Math.max(0,have-amt);
    const income=amt*price;st.money+=income;st.totalEarned+=income;
    st.manualSellTotal=(st.manualSellTotal||0)+income;
    st.marketTrades=(st.marketTrades||0)+1;
    SFX.sell();
    if(evtX)spawnFloatNum(evtX-30,evtY-20,`+${fmtNum(income)}`,'#39ff14');
    addToast(`💰 ${RES_NAMES[res]||res}: +${fmtNum(income)} TL`);
    addMsg('success',`🛒 ${fmtNum(amt)} ${RES_NAMES[res]||res} → +${fmtNum(income)} TL`);
  },[addToast,addMsg]);

  const marketBuy=useCallback((res,amtStr,evtX,evtY)=>{
    const st=sr.current;
    const basePrice=getMarketPrice(st,res);
    const buyPrice=basePrice*1.25;// 25% premium for instant buy
    const amt=parseFloat(amtStr)||0;if(amt<=0||buyPrice<=0)return;
    const cost=amt*buyPrice;
    if(st.money<cost){SFX.error();addToast(`💸 ${fmtNum(cost)} TL gerekiyor!`);return;}
    st.money-=cost;
    st.resources[res]=(st.resources[res]||0)+amt;
    st.marketTrades=(st.marketTrades||0)+1;
    SFX.buy(); if(typeof e !== "undefined" && e.clientX) particleEngine.onBuy(e.clientX, e.clientY);
    if(evtX)spawnFloatNum(evtX-30,evtY-20,`+${fmtNum(amt)}`,'#00d4ff');
    addToast(`📥 ${RES_NAMES[res]||res}: +${fmtNum(amt)}`);
    addMsg('info',`📥 Satın alındı: ${fmtNum(amt)} ${RES_NAMES[res]||res} (${fmtNum(cost)} TL)`);
  },[addToast,addMsg]);

  const advanceZone=useCallback(()=>{
    const st=sr.current;const nz=st.zone+1;if(nz>8)return;
    const req=ZONE_REQ[nz];if(!req)return;
    const hasDiscount=(st.prestigeTechs||[]).includes('pt_zone');
    const discount=hasDiscount?.2:0;
    const allMet=req.checks.every(c=>c.get(st)>=c.need*(1-discount));
    if(!allMet){SFX.error();addToast('❌ Gereksinimler henüz sağlanmadı!');return;}
    st.zone=nz;
    ALL_BUILDINGS.filter(b=>b.zone===nz).forEach(b=>{st.bldUnlocked[b.id]=true;});
    st.newZones=[...(st.newZones||[]),nz];
    const zi=ZONE_INFO[nz-1];
    setZoneFilter(nz);
    setZoneOverlay({zone:nz,info:zi});
    SFX.zoneAdvance();spawnCoinRain(28);
    addMsg('success',`🚀 BÖLGE ${nz}: ${zi.name} açıldı! ×${zi.multi} çarpan!`);
    addToast(`🌐 Bölge ${nz}: ${zi.name}`);
  },[addMsg,addToast]);

  const unlockResearch=useCallback((rid)=>{
    const st=sr.current;const r=RESEARCH_TREE.find(x=>x.id===rid);if(!r)return;
    if((st.researchUnlocked||[]).includes(rid)){addToast('✅ Zaten araştırıldı');return;}
    if(r.req&&!(st.researchUnlocked||[]).includes(r.req)){
      const reqR=RESEARCH_TREE.find(x=>x.id===r.req);
      SFX.error();addToast(`🔒 Önce: ${reqR?.name||r.req}`);return;
    }
    if(r.secretCond&&!r.secretCond(st)){SFX.error();addToast("🔒 Gizli koşullar sağlanmadı");return;}
    if((r.zone||1)>st.zone){SFX.error();addToast(`🔒 Bölge ${r.zone} gerekiyor`);return;}
    if(st.researchPoints<r.cost){SFX.error();addToast(`🔬 Yetersiz RP! (${fmtNum(r.cost-st.researchPoints)} eksik)`);return;}
    st.researchPoints-=r.cost;
    st.researchUnlocked=[...(st.researchUnlocked||[]),rid];
    SFX.achievement();
    addToast(`🔬 ${r.name} araştırıldı!`);
    addMsg('success',`🔬 Araştırma tamamlandı: ${r.name} — ${r.desc}`);
  },[addToast,addMsg]);

  const startContract=useCallback(()=>{
    const st=sr.current;if(st.activeContract){addToast('📋 Zaten aktif sözleşme var');return;}
    const eligible=CONTRACT_POOL.filter(c=>{
      const bld=ALL_BUILDINGS.find(b=>b.output===c.res);
      return!bld||bld.zone<=st.zone;
    });
    const tpl=eligible[Math.floor(Math.random()*eligible.length)];
    st.activeContract={...tpl,remaining:tpl.dur||300,id:Date.now()};
    addToast(`📋 ${tpl.label}`);
    addMsg('info',`📋 Sözleşme: ${fmtNum(tpl.amt)} ${RES_NAMES[tpl.res]||tpl.res} teslim et → +${fmtNum(tpl.reward)} TL`);
  },[addToast,addMsg]);

  const completeContract=useCallback(()=>{
    const st=sr.current;const c=st.activeContract;if(!c)return;
    const have=st.resources[c.res]||0;
    if(have<c.amt){SFX.error();addToast(`❌ ${fmtNum(c.amt-have)} adet eksik!`);return;}
    st.resources[c.res]=have-c.amt;
    st.money+=c.reward;st.totalEarned+=c.reward;
    if(c.rp)st.researchPoints+=c.rp;
    st.contractsCompleted=(st.contractsCompleted||0)+1;
    st.activeContract=null;
    SFX.milestone();spawnCoinRain(14);
    addToast(`✅ Sözleşme tamamlandı! +${fmtNum(c.reward)} TL`);
    addMsg('success',`✅ ${c.label} → +${fmtNum(c.reward)} TL${c.rp?` +${c.rp} RP`:''}`);
  },[addToast,addMsg]);

  const startExpedition=useCallback((typeId)=>{
    const st=sr.current;if(st.activeExpedition){addToast('🚀 Zaten aktif keşif var');return;}
    const expType=EXPEDITION_TYPES.find(e=>e.id===typeId);if(!expType)return;
    const canAfford=Object.entries(expType.cost).every(([res,amt])=>(st.resources[res]||0)>=amt);
    if(!canAfford){SFX.error();addToast('❌ Yeterli kaynak yok');return;}
    Object.entries(expType.cost).forEach(([res,amt])=>{st.resources[res]=Math.max(0,(st.resources[res]||0)-amt);});
    st.activeExpedition={typeId,duration:expType.duration,remaining:expType.duration};
    addToast(`🚀 ${expType.name} başladı!`);
    addMsg('info',`🚀 ${expType.name} gönderildi (${expType.duration} saniye)`);
  },[addToast,addMsg]);

  const toggleTradeRoute=useCallback((rtId)=>{
    const st=sr.current;const rt=TRADE_ROUTES.find(x=>x.id===rtId);if(!rt)return;
    const active=st.activeTradeRoutes||[];
    if(active.includes(rtId)){
      st.activeTradeRoutes=active.filter(x=>x!==rtId);
      addToast(`🛑 Rota durduruldu: ${rt.name}`);
      addMsg('info',`⚓ ${rt.name} durduruldu`);
    } else {
      if(st.money<rt.costTL){SFX.error();addToast(`💸 ${fmtNum(rt.costTL)} TL gerekiyor!`);return;}
      const reqs=rt.costRes||{};
      const canAfford=Object.entries(reqs).every(([res,amt])=>(st.resources[res]||0)>=amt);
      if(!canAfford){SFX.error();addToast('❌ Yeterli kaynak yok');return;}
      if(rt.zone>st.zone){SFX.error();addToast(`🔒 Bölge ${rt.zone} gerekiyor`);return;}
      st.money-=rt.costTL;
      Object.entries(reqs).forEach(([res,amt])=>{st.resources[res]=Math.max(0,(st.resources[res]||0)-amt);});
      st.activeTradeRoutes=[...active,rtId];
      SFX.buy(); if(typeof e !== "undefined" && e.clientX) particleEngine.onBuy(e.clientX, e.clientY);addToast(`✅ ${rt.name} aktif!`);
      addMsg('success',`⚓ ${rt.name} başlatıldı! +${fmtNum(rt.incomePerSec)} TL/s`);
    }
  },[addToast,addMsg]);

  const doPrestige=useCallback(()=>{
    const st=sr.current;
    if(st.zone<7){addToast('❌ Prestige için Bölge 7 gerekiyor!');return;}
    if(!window.confirm('Prestige yapmak istediğinize emin misiniz?\n• Tüm binalar ve kaynaklar sıfırlanır\n• Kalıcı üretim bonusu kazanırsınız\n• Araştırmalar sıfırlanır'))return;
    const pc=(st.prestigeCount||0)+1;
    const prestigeBonus=1+pc*.5;
    const pp=(st.prestigePoints||0)+1;
    const bc={},bu={},upg={};
    ALL_BUILDINGS.forEach(b=>{bc[b.id]=0;bu[b.id]=b.zone===1;upg[b.id]=0;});
    const diff=st.difficulty||'normal';const d=DIFFICULTIES[diff];
    const startBonus=(st.prestigeTechs||[]).includes('pt_start')?3:1;
    sr.current={
      ...makeDefault(diff),
      prestigeCount:pc,prestigeBonus,prestigePoints:pp,
      money:d.moneyStart*(1+pc*.3)*startBonus,
      difficulty:diff,
      achievements:st.achievements,
      bldCounts:bc,bldUnlocked:bu,bldUpgrades:upg,
      prestigeTechs:st.prestigeTechs||[],
      _ms:st._ms||{},
    };
    achCheckedR.current=new Set(sr.current.achievements);
    setTab('buildings');setZoneFilter(1);
    SFX.zoneAdvance();spawnCoinRain(40);
    addToast(`🔄 Prestige ${pc}! ×${prestigeBonus.toFixed(1)} kalıcı çarpan!`);
    addMsg('success',`🔄 Prestige ${pc} tamamlandı! Kalıcı üretim bonusu: ×${prestigeBonus.toFixed(1)}`);
  },[addToast,addMsg]);

  const buyPrestigeTech=useCallback((techId)=>{
    const st=sr.current;const pt=PRESTIGE_TECHS.find(x=>x.id===techId);if(!pt)return;
    if((st.prestigeTechs||[]).includes(techId)){addToast('✅ Zaten aktif');return;}
    if((st.prestigePoints||0)<pt.cost){SFX.error();addToast(`❌ ${pt.cost} Prestige Puanı gerekiyor`);return;}
    st.prestigePoints=(st.prestigePoints||0)-pt.cost;
    st.prestigeTechs=[...(st.prestigeTechs||[]),techId];
    SFX.achievement();
    addToast(`💫 ${pt.name} aktif!`);
    addMsg('success',`💫 Prestige Teknoloji: ${pt.name} — ${pt.desc}`);
  },[addToast,addMsg]);

  const handleSave=useCallback(()=>{doSave(sr.current);SFX.save();addToast('💾 Kaydedildi!');},[addToast]);
  const handleLoad=useCallback(()=>{
    const saved=doLoad();
    if(saved){
      sr.current={...makeDefault(saved.difficulty||'normal'),...saved};
      if(saved.achievements)saved.achievements.forEach(a=>achCheckedR.current.add(a));
      addToast('📂 Kayıt yüklendi!');setShowMenu(false);
    } else addToast('❌ Kayıt bulunamadı');
  },[addToast]);
  const handleReset=useCallback(()=>{
    if(window.confirm('Tüm ilerleme silinecek. Emin misiniz?')){
      localStorage.removeItem(SAVE_KEY);
      sr.current=makeDefault('normal');
      achCheckedR.current=new Set();
      setShowMenu(true);setTab('buildings');setZoneFilter(1);
      addToast('🔄 Oyun sıfırlandı');
    }
  },[addToast]);

  /* ── Computed values ── */
  const rb=useMemo(()=>getResearchBonuses(s),[tick]);
  const totalWorkers=useMemo(()=>ALL_BUILDINGS.reduce((acc,b)=>acc+(b.workers*(s.bldCounts[b.id]||0)),0),[tick]);
  const totalWagePerMin=useMemo(()=>
    ALL_BUILDINGS.reduce((acc,b)=>{const c=s.bldCounts[b.id]||0;return acc+(c>0?b.workerWage*b.workers*c:0);},0)
    *Math.max(.1,1+rb.wageMulti)*diff.wageMult
  ,[tick]);
  const xpPct=useMemo(()=>Math.min(100,s.xp/XP_PER_LEVEL(s.level)*100),[tick]);
  const eOk=s.energyProd>=s.energyCons;
  const ePct=s.energyCons>0?Math.min(100,s.energyProd/s.energyCons*100):100;
  const nextReq=s.zone<8?ZONE_REQ[s.zone+1]:null;
  const newAchCnt=useMemo(()=>ACHIEVEMENTS.filter(a=>!s.achievements.includes(a.id)&&a.check(s)).length,[tick]);
  const hasActiveEvent=!!(s.activeRandomEvent||s.activeMarketEvent);
  const particles=useMemo(()=>Array.from({length:18},(_,i)=>({id:i,left:Math.random()*100,size:1+Math.random()*2,delay:Math.random()*8,dur:4+Math.random()*8})),[]);

  return (
    <div className={`app ${zInfo.theme||''}`}>

      {/* ── Background Particles ── */}
      <div className="particles">
        {particles.map(p=>(
          <div key={p.id} className="particle" style={{
            left:`${p.left}%`,
            width:`${p.size}px`,height:`${p.size}px`,
            animationDuration:`${p.dur}s`,
            animationDelay:`${p.delay}s`
          }}/>
        ))}
      </div>

      {/* ══════════════════════════════════════════
          MAIN MENU OVERLAY
      ══════════════════════════════════════════ */}
      {showMenu && (
        <div className="overlay">
          <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
            {Array.from({length:30},(_,i)=>(
              <div key={i} className="zone-star" style={{
                left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,
                width:`${1+Math.random()*3}px`,height:`${1+Math.random()*3}px`,
                '--dur':`${1+Math.random()*3}s`
              }}/>
            ))}
          </div>
          <div className="overlay-inner">
            <span className="overlay-icon">🏭</span>
            <div className="overlay-title" style={{color:'var(--zone-accent)'}}>ENDÜSTRİ İMPARATORLUĞU</div>
            <div className="overlay-sub" style={{fontFamily:"'Orbitron',monospace",fontSize:'10px',letterSpacing:'3px',marginBottom:'20px'}}>V5 — SONSUZ ÜRETİM</div>
            <div style={{fontSize:'11px',color:'var(--text2)',marginBottom:'10px',fontFamily:"'Share Tech Mono',monospace"}}>Zorluk Seç</div>
            <div className="diff-grid" style={{maxWidth:'280px',margin:'0 auto 16px'}}>
              {Object.entries(DIFFICULTIES).map(([key,d])=>(
                <div key={key}
                  className={`diff-btn ${key}${selectedDiff===key?' active':''}`}
                  onClick={()=>setSelectedDiff(key)}
                >
                  <div style={{fontSize:'13px',marginBottom:'2px'}}>{d.label}</div>
                  <div style={{fontSize:'9px',opacity:.7,fontFamily:"'Share Tech Mono',monospace"}}>{d.desc.split('|')[0].trim()}</div>
                </div>
              ))}
            </div>
            <button className="overlay-btn" onClick={()=>{
              const saved=doLoad();
              if(saved){
                sr.current={...makeDefault(saved.difficulty||'normal'),...saved};
                if(saved.achievements)saved.achievements.forEach(a=>achCheckedR.current.add(a));
              } else {
                sr.current=makeDefault(selectedDiff);
              }
              setShowMenu(false);
              addToast('🏭 Oyun başladı!');
            }}>▶ OYNA</button>
            {doLoad()&&(
              <button className="overlay-btn secondary" style={{marginTop:'6px'}} onClick={()=>{
                const saved=doLoad();
                if(saved){
                  sr.current={...makeDefault(saved.difficulty||'normal'),...saved};
                  if(saved.achievements)saved.achievements.forEach(a=>achCheckedR.current.add(a));
                  addToast('📂 Kayıt yüklendi!');
                  setShowMenu(false);
                } else addToast('❌ Kayıt bulunamadı');
              }}>📂 Kayıt Yükle</button>
            )}
            <button className="overlay-btn secondary" style={{marginTop:'6px',display:'block',margin:'6px auto 0'}} onClick={()=>{
              sr.current=makeDefault(selectedDiff);
              setShowMenu(false);
              addToast('🆕 Yeni oyun başladı!');
            }}>🆕 Yeni Oyun</button>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════
          LEVEL UP FLASH + BANNER
      ══════════════════════════════════════════ */}
      {levelFlash && <div className="levelup-flash"/>}
      {levelNum && (
        <div className="levelup-banner">
          <div className="levelup-banner-inner">
            <div className="levelup-banner-lbl">SEVİYE ATLANDI</div>
            <div className="levelup-banner-num">{levelNum}</div>
          </div>
        </div>
      )}

      {/* ── Achievement Popup ── */}
      {achPopup && (
        <div className="ach-popup" key={achPopup.key}>
          <div className="ach-popup-inner">
            <span className="ach-popup-icon">{achPopup.icon}</span>
            <div className="ach-popup-title">BAŞARI KAZANILDI</div>
            <div className="ach-popup-name">{achPopup.name}</div>
            <div className="ach-popup-reward">{achPopup.reward}</div>
          </div>
        </div>
      )}

      {/* ── Event Popup ── */}
      {eventPopup && (
        <div className="event-popup" key={eventPopup.key}>
          <div className="event-popup-inner">
            <span className="event-popup-icon">{eventPopup.good?'✨':'⚠️'}</span>
            <div className="event-popup-title">OLAY!</div>
            <div className="event-popup-name">{eventPopup.name}</div>
            <div className="event-popup-effect">{eventPopup.desc}</div>
          </div>
        </div>
      )}

      {/* ── Zone Advance Overlay ── */}
      {zoneOverlay && (
        <div className="overlay" onClick={()=>setZoneOverlay(null)}>
          <div style={{position:'absolute',inset:0,overflow:'hidden',pointerEvents:'none'}}>
            {Array.from({length:40},(_,i)=>(
              <div key={i} className="zone-star" style={{
                left:`${Math.random()*100}%`,top:`${Math.random()*100}%`,
                width:`${1+Math.random()*3}px`,height:`${1+Math.random()*3}px`,
                '--dur':`${.8+Math.random()*2}s`
              }}/>
            ))}
          </div>
          <div className="overlay-inner">
            <span className="overlay-icon">{zoneOverlay.info.icon}</span>
            <div className="overlay-title" style={{color:zoneOverlay.info.color}}>BÖLGE {zoneOverlay.zone}</div>
            <div style={{fontFamily:"'Orbitron',monospace",fontSize:'14px',color:zoneOverlay.info.color,marginBottom:'6px'}}>{zoneOverlay.info.name}</div>
            <div className="overlay-sub">{zoneOverlay.info.desc}</div>
            <div style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'11px',color:'var(--gold)',margin:'8px 0 16px'}}>
              ×{zoneOverlay.info.multi} ÜRETİM ÇARPANI!
            </div>
            <button className="overlay-btn" onClick={()=>setZoneOverlay(null)}>⚡ DEVAM ET</button>
          </div>
        </div>
      )}

      {/* ══════════════════════════════════════════
          HEADER
      ══════════════════════════════════════════ */}
      <div className="header">
        <div className="header-top">
          <div className="game-title glow-text">⚙ ENDÜSTRİ</div>
          <div className="header-badges"><button className="ctrl-btn" onClick={()=>setShowAudio(v=>!v)}>🔊</button>
            {hasActiveEvent && (
              <div className="event-badge" onClick={()=>setTab('events')}>⚡ OLAY!</div>
            )}
            <div className="zone-era-badge">{zInfo.era}</div>
            <div className="diff-badge" style={{borderColor:diff.color,color:diff.color,background:`${diff.color}18`}}>
              {diff.label.toUpperCase()}
            </div>
            <button className="ctrl-btn" onClick={()=>setShowMenu(true)} style={{fontSize:'14px',padding:'2px 6px'}}>☰</button>
          </div>
        </div>

        <div className="header-stats">
          <div className="stat-chip gold span2">
            <span className="lbl">💰</span>
            <span className="val">{fmtNum(s.money)} TL</span>
          </div>
          <div className="stat-chip green-v">
            <span className="lbl">📈</span>
            <span className="val">{fmtRate(s.resRates?.TL||0)}</span>
          </div>
          <div className="stat-chip purple-v">
            <span className="lbl">🔬</span>
            <span className="val">{fmtNum(s.researchPoints)} RP</span>
          </div>
          <div className="stat-chip">
            <span className="lbl">🏗️</span>
            <span className="val">{s.totalBuildings||0}</span>
          </div>
          <div className="stat-chip">
            <span className="lbl">👷</span>
            <span className="val">{totalWorkers}</span>
          </div>
          <div className="stat-chip red-v">
            <span className="lbl">💸</span>
            <span className="val">{fmtRate(totalWagePerMin/60)}</span>
          </div>
        </div>

        <div className="energy-chip" style={{marginBottom:'3px'}}>
          <div className="energy-lbl">
            <span>⚡ ENERJİ</span>
            <span style={{color:eOk?'var(--accent3)':'var(--red)'}}>
              {fmtNum(s.energyProd)} / {fmtNum(s.energyCons)} {eOk?'✓':'⚠'}
            </span>
          </div>
          <div className="energy-bar">
            <div className={`energy-fill ${eOk?'energy-ok':'energy-low'}`} style={{width:`${ePct}%`}}/>
          </div>
        </div>

        <div className="ctrl-row">
          <div className="level-badge">LV {s.level||1}</div>
          <div className="xp-bar-wrap">
            <div className="xp-bar"><div className="xp-fill" style={{width:`${xpPct}%`}}/></div>
          </div>
          <button className={`ctrl-btn${paused?' paused':''}`} onClick={()=>setPaused(p=>!p)}>
            {paused?'▶ DEVAM':'⏸'}
          </button>
          {[1,2,5].map(spd=>(
            <button key={spd} className={`ctrl-btn spd${speed===spd?' on':''}`}
              onClick={()=>setSpeed(spd)}>×{spd}</button>
          ))}
        </div>
      </div>

      {/* ══════════════════════════════════════════
          TAB BAR
      ══════════════════════════════════════════ */}
      <div className="tabs">
        {[
          {id:'buildings',label:'🏗️ Binalar'},
          {id:'resources',label:'📦 Kaynaklar'},
          {id:'research',label:'🔬 Araştırma'},
          {id:'market',label:'🛒 Pazar'},
          {id:'events',label:'⚡ Olaylar',badge:hasActiveEvent?'!':null},
          {id:'contracts',label:'📋 Sözleşme',badge:s.activeContract?'1':null},
          {id:'expedition',label:'🚀 Keşif',badge:s.activeExpedition?'1':null},
          {id:'routes',label:'⚓ Rotalar'},
          {id:'achievements',label:'🏆 Başarılar',badge:newAchCnt>0?newAchCnt:null},
          {id:'log',label:'📜 Log'},
          {id:'settings',label:'⚙️ Ayarlar'},
        ].map(t=>(
          <div key={t.id} className={`tab${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>
            {t.label}
            {t.badge && <span className="tab-badge">{t.badge}</span>}
          </div>
        ))}
      </div>

                  const hasNoEnergy=!eOk&&b.energyUse>0&&b.energyProd===0;
                  const upgLevel=(s.bldUpgrades||{})[b.id]||0;
                  const upgMaxed=upgLevel>=UPGRADE_LEVELS.length;
                  const upgNext=!upgMaxed?UPGRADE_LEVELS[upgLevel]:null;
                  const upgCost=upgNext?getUpgradeCost(b,upgLevel,dc.costMult):0;
                  const isJustBought=justBought===b.id;

                  let cardClass='bld-card';
                  if(count>0)cardClass+=' running';
                  else if(canBuy)cardClass+=' affor';
                  if(!unlocked)cardClass+=' locked-c';
                  if(hasNoEnergy)cardClass+=' no-energy';
                  if(upgLevel>0)cardClass+=' upgraded';

                          <div className="bc-stat s-rate">
                            <span className="sl">{RES_ICONS[b.output]||'📦'}</span>
                            <span className="sv">{fmtRate(b.rate*(count||1)*getBuildingUpgradeMult(s,b.id))}</span>
                          </div>
                        )}
                        <div className="bc-stat s-cost">
                          <span className="sl">💰</span>
                          <span className="sv">{fmtNum(cost)}</span>
                        </div>
                        {b.energyUse>0&&(
                          <div className="bc-stat s-energy">
                            <span className="sl">⚡</span>
                            <span className="sv">-{b.energyUse*Math.max(count,1)}</span>
                          </div>

                          <div className="bc-stat s-eprod">

                            <span className="sv">+{b.energyProd*Math.max(count,1)}</span>

                        {b.inputs.length>0&&(
                          <div className="bc-stat s-input">
                            <span className="sl">📥</span>
                            <span className="sv">{b.inputs.filter((_,i)=>i%2===0).map(r=>RES_NAMES[r]||r).join('+')}</span>
                          </div>
                        )}
                        {b.workers>0&&(
                          <div className="bc-stat s-wage">
                            <span className="sl">👷</span>
                            <span className="sv">{b.workers*Math.max(count,1)}</span>

                          <button
                            className={`buy-btn ${canBuy?'on':'off'}`}

              </div>
            </>

        {/* ── RESOURCES TAB ── */}

          const allResKeys=[...new Set([...Object.keys(RES_NAMES),...Object.keys(s.resources||{})])].filter(k=>k!=='TL'&&k!=='RP'&&((s.resources[k]||0)>0||(s.resRates[k]||0)>0));

          return (
            <>

                <div className={`toggle${autoSellEnabled?' on':''}`} onClick={()=>setAutoSellEnabled(v=>!v)}>
                  <div className="toggle-knob"/>
                </div>
              </div>
              {!eOk&&(
                <div className="wage-warning">⚡ Enerji yetersiz! Bazı binalar durdu.</div>

                  const val=s.resources[k]||0;
                  const rate=s.resRates[k]||0;
                  const price=getMarketPrice(s,k);
                  const sellAmt=manualSellAmts[k]||'';
                  return (
                    <div key={k} className="res-card">
                      <div className="rc-top">
                        <div className="rc-icon">{RES_ICONS[k]||'📦'}</div>
                        <div className="rc-name">{RES_NAMES[k]||k}</div>
                      </div>
                      <div className="rc-val">{fmtNum(val)}</div>
                      <div className={`rc-rate${rate>0?' positive':rate<0?' negative':''}`}>{fmtRate(rate)}</div>
                      {price>0&&(
                        <div className="rc-sell-row">
                          <span className="rc-sell-label">💰 {fmtNum(price)}/u</span>
                          <input
                            className="rc-sell-input"
                            type="number"
                            min="0"
                            placeholder="miktar"
                            value={sellAmt}
                            onChange={e=>setManualSellAmts(p=>({...p,[k]:e.target.value}))}

                          <button
                            className="rc-sell-btn"
                            onClick={e=>{
                              manualSell(k,sellAmt||String(val),e.clientX,e.clientY);

                            }}
                          >Sat</button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>

        })()}

          return (
            <div className="market-grid">
              {s.activeMarketEvent&&(
                <div className="market-event-banner">
                  <div className="market-event-title">📈 {s.activeMarketEvent.name}</div>

              {mktRes.map(k=>{

                const cur=getMarketPrice(s,k);
                const trend=cur>base?'up':cur<base?'down':'normal';
                const have=s.resources[k]||0;
                const buyAmt=marketAmts[k+'_buy']||'';
                const sellAmt=marketAmts[k+'_sell']||'';
                const isEvent=s.activeMarketEvent&&(s.activeMarketEvent.resources.includes('ALL')||s.activeMarketEvent.resources.includes(k));

                return (
                  <div key={k} className={`market-card${isEvent?' event-active':''}`}>
                    <div className="market-price-row">
                      <div className="market-icon">{RES_ICONS[k]||'📦'}</div>
                      <div className="market-name">{RES_NAMES[k]||k}</div>
                      <div>
                        <span className={`market-price ${trend}`}>{fmtNum(cur)} TL/u</span>
                        <span className="market-trend">{trend==='up'?'▲':trend==='down'?'▼':'─'}</span>
                      </div>
                    </div>
                    <div style={{fontSize:'9px',color:'var(--text3)',marginBottom:'6px',fontFamily:"'Share Tech Mono',monospace"}}>

                    <div className="market-btns">
                      <input

                      <button
                        className="market-sell-btn"

                          manualSell(k,sellAmt||String(have),e.clientX,e.clientY);

                      >SAT</button>
                      <input
                        className="market-amt-input"
                        type="number"
                        min="0"
                        placeholder="miktar"
                        value={buyAmt}
                        onChange={e=>setMarketAmts(p=>({...p,[k+'_buy']:e.target.value}))}
                      />
                      <button
                        className="market-buy-btn"
                        onClick={e=>{
                          marketBuy(k,buyAmt,e.clientX,e.clientY);
                          setMarketAmts(p=>({...p,[k+'_buy']:''}));
                        }}
                      >AL</button>
                    </div>
                  </div>
                );
              })}
            </div>
          );
        })()}

              </div>

            {s.activeRandomEvent&&(
              <div className={`event-card active-event ${s.activeRandomEvent.good?'good-event':'bad-event'}`}>

                    <div className="event-name">{s.activeRandomEvent.name}</div>

                <div style={{fontSize:'9px',color:'var(--text2)',marginTop:'4px',fontFamily:"'Share Tech Mono',monospace"}}>
                  {s.randomEventTimer>0?`⏱ ${Math.ceil(s.randomEventTimer)}s kaldı`:'Anlık etki'}
                </div>
              </div>

              <div className="event-card active-event good-event">

                  <div className="event-info">
                    <div className="event-name">{s.activeMarketEvent.name}</div>
                    <div className="event-desc">{s.activeMarketEvent.desc}</div>
                  </div>
                </div>
                <div className="event-timer-bar">
                  <div className="event-timer-fill good" style={{width:`${Math.min(100,(s.marketEventTimer/(s.activeMarketEvent.duration||60))*100)}%`}}/>

                <div style={{fontSize:'9px',color:'var(--gold)',marginTop:'4px',fontFamily:"'Share Tech Mono',monospace"}}>

              Toplam Yaşanan Olay: {s.eventsLived||0}
            </div>
          </div>

        {tab==='contracts' && (
          <div>
            <div style={{background:'var(--card)',border:'1px solid var(--border2)',borderRadius:'9px',padding:'9px 11px',marginBottom:'8px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'11px',color:'var(--text2)'}}>Tamamlanan</span>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'13px',color:'var(--accent3)'}}>{s.contractsCompleted||0}</span>
            </div>
            {s.activeContract?(
              <div style={{background:'var(--card)',border:'2px solid var(--zone-accent)',borderRadius:'10px',padding:'12px'}}>
                <div style={{fontSize:'13px',fontWeight:700,marginBottom:'5px'}}>📋 {s.activeContract.label}</div>
                <div style={{fontSize:'10px',color:'var(--text2)',marginBottom:'8px'}}>

              </div>

              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'13px',color:'var(--accent3)'}}>{s.expeditionsCompleted||0}</span>

                    <>
                      <div style={{fontSize:'13px',fontWeight:700,marginBottom:'5px'}}>🚀 {expType?.name||'Keşif'}</div>

                    </button>
                  </div>

              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'13px',color:'var(--accent3)'}}>{(s.activeTradeRoutes||[]).length}/{TRADE_ROUTES.length}</span>

                <div key={rt.id} className={`route-card${active?' active-route':''}`}>

                      <div className="route-desc">{rt.desc}</div>
                      <div className="route-income">+{fmtRate(rt.incomePerSec)} {rt.rpPerSec>0?`| +${fmtRate(rt.rpPerSec)} RP`:''}</div>
                    </div>
                  </div>
                  {!zoneOk&&(
                    <div style={{fontSize:'9px',color:'var(--text3)',marginBottom:'5px'}}>🔒 Bölge {rt.zone} gerekiyor</div>
                  )}
                  {zoneOk&&!active&&(
                    <div style={{fontSize:'9px',color:'var(--gold)',marginBottom:'5px',fontFamily:"'Share Tech Mono',monospace"}}>
                      Maliyet: {fmtNum(rt.costTL)} TL
                      {Object.entries(rt.costRes||{}).map(([r,a])=>` + ${fmtNum(a)} ${RES_NAMES[r]||r}`).join('')}
                    </div>
                  )}
                  <button
                    className={`route-btn ${active?'on':'off'}`}
                    onClick={()=>zoneOk&&toggleTradeRoute(rt.id)}
                    style={{width:'100%',cursor:!zoneOk?'not-allowed':'pointer'}}
                  >
                    {!zoneOk?`🔒 Bölge ${rt.zone}`:active?'🛑 Durdur':'▶ Başlat'}
                  </button>
                </div>
              );
            })}
          </div>
        )}

        {/* ── ACHIEVEMENTS TAB ── */}
        {tab==='achievements' && (
          <div className="ach-grid">
            <div style={{background:'var(--card)',border:'1px solid var(--border2)',borderRadius:'9px',padding:'8px 11px',marginBottom:'4px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontSize:'11px',color:'var(--text2)'}}>Kazanılan</span>
              <span style={{fontFamily:"'Share Tech Mono',monospace",fontSize:'13px',color:'var(--gold)'}}>{s.achievements?.length||0}/{ACHIEVEMENTS.length}</span>
            </div>
            {ACHIEVEMENTS.map(a=>{
              const unlocked=(s.achievements||[]).includes(a.id);
              return (
                <div key={a.id} className={`ach-card${unlocked?' unlocked':''}`}>
                  <div className="ach-icon">{a.icon||'🏆'}</div>
                  <div className="ach-info">
                    <div className="ach-name">{a.name}</div>
                    <div className="ach-desc">{a.desc}</div>
                    {unlocked&&<div className="ach-reward">✦ {a.reward}</div>}
                  </div>
                  {unlocked&&<div className="ach-badge">✓</div>}
                </div>
              );
            })}
          </div>
        )}

        {/* ── LOG TAB ── */}
        {tab==='log' && (
          <div className="msg-list">
            {(s.messages||[]).length===0?(
              <div style={{textAlign:'center',color:'var(--text3)',padding:'24px'}}>Henüz mesaj yok.</div>
            ):(s.messages||[]).map(m=>(
              <div key={m.id} className={`msg-item ${m.type||'info'}`}>
                <div className="msg-time">{m.time}</div>
                <div className="msg-text">{m.text}</div>
              </div>
            ))}
          </div>
        )}

        {/* ── SETTINGS TAB ── */}
        {tab==='settings' && (
          <div className="sett-section">

            {/* Save / Load / Reset */}
            <div className="sett-card">
              <div className="sett-title">💾 KAYIT</div>
              <div className="sett-row">
                <button className="sett-btn s" onClick={handleSave}>💾 Kaydet</button>
                <button className="sett-btn l" onClick={handleLoad}>📂 Yükle</button>
                <button className="sett-btn r" onClick={handleReset}>🔄 Sıfırla</button>
              </div>
            </div>

            {/* Difficulty display */}
            <div className="sett-card">
              <div className="sett-title">⚙️ ZORLUK</div>
              <div className="diff-grid">
                {Object.entries(DIFFICULTIES).map(([key,d])=>(
                  <div key={key} className={`diff-btn ${key}${(s.difficulty||'normal')===key?' active':''}`}>
                    <div>{d.label}</div>
                    <div style={{fontSize:'9px',opacity:.7}}>{d.desc.split('|')[0].trim()}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:'9px',color:'var(--text3)',textAlign:'center'}}>Zorluk oyun başında seçilir.</div>
            </div>

            {/* Prestige */}
            <div className="sett-card">
              <div className="prestige-banner">
                <div className="prestige-title">🔄 PRESTİJ SİSTEMİ</div>
                <div style={{fontSize:'10px',color:'var(--text2)',marginBottom:'4px'}}>
                  Prestige {s.prestigeCount||0} | Çarpan: ×{(s.prestigeBonus||1).toFixed(1)} | Puan: {s.prestigePoints||0}
                </div>
                <div style={{fontSize:'9px',color:'var(--text3)',marginBottom:'8px'}}>
                  Bölge 7'ye ulaşınca prestige yapabilirsin. Tüm binalar sıfırlanır ama kalıcı bonus kazanırsın.
                </div>
                <button
                  style={{width:'100%',padding:'9px',borderRadius:'8px',border:`1px solid ${(s.zone||1)>=7?'var(--pink)':'var(--border2)'}`,
                    background:(s.zone||1)>=7?'rgba(255,0,255,.12)':'var(--bg3)',
                    color:(s.zone||1)>=7?'var(--pink)':'var(--text3)',
                    fontFamily:"'Orbitron',monospace",fontWeight:700,fontSize:'11px',cursor:(s.zone||1)>=7?'pointer':'not-allowed'}}
                  onClick={doPrestige}
                >
                  {(s.zone||1)>=7?'🔄 PRESTİJ YAP':'🔒 Bölge 7 Gerekli'}
                </button>

                {/* Prestige techs */}
                {(s.prestigeCount||0)>0&&(
                  <>
                    <div style={{fontSize:'9px',color:'var(--text3)',margin:'8px 0 4px',fontFamily:"'Orbitron',monospace",letterSpacing:'1px'}}>PRESTİJ TEKNOLOJİLERİ</div>
                    <div className="prestige-tech-grid">
                      {PRESTIGE_TECHS.map(pt=>{
                        const owned=(s.prestigeTechs||[]).includes(pt.id);
                        const canBuy=(s.prestigePoints||0)>=pt.cost&&!owned;
                        return (
                          <div key={pt.id}
                            className={`prestige-tech${owned?' owned':''}${!owned&&!canBuy?' cant':''}`}
                            onClick={()=>canBuy&&buyPrestigeTech(pt.id)}
                          >
                            <div className="prestige-tech-name">{pt.icon||'💫'} {pt.name}</div>
                            <div className="prestige-tech-desc">{pt.desc}</div>
                            <div className="prestige-tech-cost">{owned?'✓ Sahip':`${pt.cost} PP`}</div>
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            </div>

            {/* God Mode */}
            <div className="sett-card">
              <div className="sett-title">👁️ TANRI MODU</div>
              <div className="toggle-row">
                <span className="toggle-row-label">God Mode (×100 üretim)</span>
                <div className={`toggle${godMode?' on':''}`} onClick={()=>setGodMode(v=>!v)}>
                  <div className="toggle-knob"/>
                </div>
              </div>
              {godMode&&(
                <div className="god-panel">
                  <div>XP Çarpanı: ×{godLevelMult}</div>
                  <div className="god-quick-btns">
                    <button className="god-btn" onClick={()=>{sr.current.money+=1e9;addToast('💰 +1B TL');}}>+1B TL</button>
                    <button className="god-btn" onClick={()=>{sr.current.researchPoints+=10000;addToast('🔬 +10K RP');}}>+10K RP</button>
                    <button className="god-btn" onClick={()=>{sr.current.xp+=XP_PER_LEVEL(sr.current.level)*5;addToast('⬆ +5 LVL XP');}}>+5LVL XP</button>
                    <button className="god-btn" onClick={()=>{
                      Object.keys(sr.current.resources||{}).forEach(k=>{sr.current.resources[k]=(sr.current.resources[k]||0)+10000;});
                      addToast('📦 +10K tüm kaynaklar');
                    }}>+10K RES</button>
                    <button className="god-btn" onClick={()=>setGodLevelMult(m=>Math.min(m*2,1000))}>XP×2</button>
                    <button className="god-btn" onClick={()=>setGodLevelMult(10)}>XP Reset</button>
                  </div>
                </div>
              )}
            </div>

            {/* Stats */}
            <div className="sett-card">
              <div className="sett-title">📊 İSTATİSTİKLER</div>
              {[
                ['Toplam Kazanç','💰',fmtNum(s.totalEarned||0)+' TL'],
                ['Toplam Bina','🏗️',fmtNum(s.totalBuildings||0)],
                ['Araştırma RP','🔬',fmtNum(s.researchPoints||0)],
                ['Seviye','⬆️',s.level||1],
                ['Bölge','🌐',`${s.zone||1} — ${zInfo.name}`],
                ['Prestige','🔄',s.prestigeCount||0],
                ['Manuel Satış','🛒',fmtNum(s.manualSellTotal||0)+' TL'],
                ['Pazar İşlemi','📈',s.marketTrades||0],
                ['Yükseltme','⬆️',s.upgradesDone||0],
                ['Sözleşme','📋',s.contractsCompleted||0],
                ['Keşif','🚀',s.expeditionsCompleted||0],
                ['Yaşanan Olay','⚡',s.eventsLived||0],
                ['Oyun Süresi','⏱️',`${Math.floor((s.playTime||0)/60)}d ${Math.floor((s.playTime||0)%60)}s`],
              ].map(([lbl,ico,val])=>(
                <div key={lbl} className="info-row">
                  <span className="ik">{ico} {lbl}</span>
                  <span className="iv">{val}</span>
                </div>
              ))}
            </div>

            {/* About */}
            <div className="sett-card">
              <div className="sett-title">ℹ️ HAKKINDA</div>
              <div style={{fontSize:'10px',color:'var(--text2)',lineHeight:1.8}}>
                <div>🏭 Endüstri İmparatorluğu v5</div>
                <div>8 Bölge • 60+ Bina • 35 Araştırma</div>
                <div>50 Başarı • Prestige Sistemi</div>
                <div style={{marginTop:'4px',color:'var(--text3)'}}>v5.0 — Sonsuz Üretim</div>
              </div>
            </div>

          </div>
        )}

      </div>{/* /content */}

      {/* ══════════════════════════════════════════
          TOAST WRAPPER
      ══════════════════════════════════════════ */}
      {showAudio && <SettingsModal sr={sr} onClose={()=>setShowAudio(false)} forceUpdate={forceUpdate}/>}
      <div className="toast-wrap">
        {toasts.map(t=>(
          <div key={t.id} className={`toast show${t.type?' '+t.type:''}`}>{t.msg}</div>
        ))}
      </div>

      {/* ── Milestone Wrapper ── */}
      <div className="milestone-wrap">
        {milestones.map(m=>(
          <div key={m.id} className="milestone">{m.text}</div>
        ))}
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
